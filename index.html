function renderAnnualPlan() {
  const now = today();
  const container = document.getElementById('planner-annual');
  container.innerHTML = TERMS.map(t => {
    const started = now >= t.start;
    const ended = now > t.end;
    let elapsed = 0;
    if (started) {
      const cur = new Date(Math.min(new Date(), new Date(t.end)));
      elapsed = Math.round((cur - new Date(t.start)) / 86400000);
    }
    const dayPct = t.days ? Math.min(100, Math.round(elapsed/t.days*100)) : 0;
    const status = !started?'예정':ended?'완료':'진행중';
    const statusColor = !started?'var(--text4)':ended?'var(--teal)':'var(--accent)';
    const todos = state.termTodos[t.id] || [];

    return `<div class="term-block" style="margin-bottom:12px">
      <div class="term-hd">
        <div>
          <div class="term-hd-name" style="font-size:14px">${t.name} <span style="font-size:11px;font-weight:400;color:${statusColor}">${status}</span></div>
          <div class="term-hd-dates">${t.start} ~ ${t.end} · ${t.days}일</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:${statusColor}">${dayPct}%</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)">${elapsed}/${t.days}일</div>
        </div>
      </div>
      <div class="term-body">
        <div class="pbar" style="margin-bottom:12px"><div class="pbar-fill" style="width:${dayPct}%;background:${statusColor}"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">할 일 목록</div>
        <div class="todo-list" id="todo-list-${t.id}">${todos.map((td2,i)=>`
          <div class="todo-item ${td2.done?'done-item':''}">
            <input type="checkbox" ${td2.done?'checked':''} data-tid="${t.id}" data-idx="${i}" class="todo-cb">
            <div class="todo-item-text ${td2.done?'done-text':''}" data-tid="${t.id}" data-idx="${i}">${td2.text}</div>
            <button class="todo-del" data-tid="${t.id}" data-idx="${i}">✕</button>
          </div>`).join('')}</div>
        <div class="todo-add-row">
          <input type="text" id="todo-inp-${t.id}" placeholder="할 일 추가...">
          <button class="btn btn-ghost btn-sm" data-tid="${t.id}" class="todo-add-btn" style="white-space:nowrap">추가</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // bind events
  container.querySelectorAll('.todo-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      state.termTodos[cb.dataset.tid][cb.dataset.idx].done = cb.checked;
      saveState(); renderAnnualPlan();
    });
  });
  container.querySelectorAll('.todo-del').forEach(btn => {
    btn.addEventListener('click', () => {
      state.termTodos[btn.dataset.tid].splice(Number(btn.dataset.idx),1);
      saveState(); renderAnnualPlan();
    });
  });
  container.querySelectorAll('[class="btn btn-ghost btn-sm"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tid = btn.dataset.tid;
      const inp = document.getElementById(`todo-inp-${tid}`);
      const text = inp.value.trim();
      if (!text) return;
      if (!state.termTodos[tid]) state.termTodos[tid] = [];
      state.termTodos[tid].push({id:Date.now().toString(36), text, done:false});
      inp.value = '';
      saveState(); renderAnnualPlan();
    });
  });
  // Also handle by delegating add buttons via data attributes
  container.querySelectorAll('.todo-add-row .btn').forEach(btn => {
    const tid = btn.getAttribute('data-tid');
    if (!tid) return;
    btn.addEventListener('click', () => {
      const inp = document.getElementById(`todo-inp-${tid}`);
      const text = inp.value.trim();
      if (!text) return;
      if (!state.termTodos[tid]) state.termTodos[tid] = [];
      state.termTodos[tid].push({id:Date.now().toString(36), text, done:false});
      inp.value = '';
      saveState(); renderAnnualPlan();
    });
  });
}

const DAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];
const DAY_NAMES = ['월','화','수','목','금','토','일'];
const TIME_SLOTS = [];
for (let h=6; h<=23; h++) TIME_SLOTS.push(`${String(h).padStart(2,'0')}:00`);

function renderWeeklySchedule() {
  const container = document.getElementById('planner-weekly');
  const sch = state.weeklySchedule[schEditTerm] || [];
  const termTabsHtml = TERMS.map(t =>
    `<button class="term-stab ${t.id===schEditTerm?'on':''}" data-tid="${t.id}" style="flex:none;padding:6px 16px">${t.name}</button>`
  ).join('');

  let tableHtml = `<table class="schedule-table"><thead><tr>
    <th style="width:44px">시간</th>
    ${DAY_NAMES.map(d=>`<th>${d}</th>`).join('')}
  </tr></thead><tbody>`;

  TIME_SLOTS.forEach(time => {
    const row = sch.find(r=>r.time===time) || {time};
    tableHtml += `<tr>
      <td class="sch-time-col">${time}</td>
      ${DAY_KEYS.map(dk => {
        const val = row[dk]||'';
        return `<td class="${val?'has-content':''}" data-time="${time}" data-day="${dk}">${val}</td>`;
      }).join('')}
    </tr>`;
  });
  tableHtml += '</tbody></table>';

  container.innerHTML = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${termTabsHtml}</div>
    <div class="card" style="padding:8px;overflow-x:auto">${tableHtml}</div>`;

  container.querySelectorAll('.term-stab').forEach(btn => {
    btn.addEventListener('click', () => { schEditTerm = Number(btn.dataset.tid); renderWeeklySchedule(); });
  });
  container.querySelectorAll('.schedule-table td:not(.sch-time-col)').forEach(cell => {
    cell.addEventListener('click', () => {
      schEditKey = {time: cell.dataset.time, day: cell.dataset.day};
      document.getElementById('modal-sch-title').textContent = `${cell.dataset.time} ${DAY_NAMES[DAY_KEYS.indexOf(cell.dataset.day)]}요일`;
      const sch2 = state.weeklySchedule[schEditTerm]||[];
      const row = sch2.find(r=>r.time===cell.dataset.time);
      document.getElementById('inp-sch-cell').value = row ? (row[cell.dataset.day]||'') : '';
      openModal('modal-sch');
    });
  });
}

document.getElementById('btn-close-sch').addEventListener('click', () => closeModal('modal-sch'));
document.getElementById('btn-save-sch').addEventListener('click', () => {
  if (!schEditKey) return;
  const val = document.getElementById('inp-sch-cell').value.trim();
  let sch = state.weeklySchedule[schEditTerm];
  if (!sch) sch = state.weeklySchedule[schEditTerm] = [];
  let row = sch.find(r=>r.time===schEditKey.time);
  if (!row) { row = {time:schEditKey.time}; sch.push(row); }
  if (val) row[schEditKey.day] = val;
  else delete row[schEditKey.day];
  saveState();
  closeModal('modal-sch');
  renderWeeklySchedule();
});
document.getElementById('btn-del-sch').addEventListener('click', () => {
  if (!schEditKey) return;
  let sch = state.weeklySchedule[schEditTerm];
  if (!sch) return;
  const row = sch.find(r=>r.time===schEditKey.time);
  if (row) { delete row[schEditKey.day]; }
  saveState();
  closeModal('modal-sch');
  renderWeeklySchedule();
});

  a.download = `imgo_backup_${today()}.json`;

function importData() {
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.dailyLogs) state.dailyLogs = d.dailyLogs;
        if (d.dailyTodos) state.dailyTodos = d.dailyTodos;
        if (d.examScores) state.examScores = d.examScores;
        if (d.termTodos) state.termTodos = {...state.termTodos,...d.termTodos};
        if (d.weeklySchedule) state.weeklySchedule = {...state.weeklySchedule,...d.weeklySchedule};
        if (d.reportSettings) state.reportSettings = {...state.reportSettings,...d.reportSettings};
        if (d.lectures) {
          // data.json 단일 소스: 그대로 사용
          state.lectures = d.lectures;
        }
        saveState(); renderPage(currentPage);
        closeModal('modal-backup');
        toast('✓ 데이터 불러오기 완료');
      } catch(e2) { toast('파일 오류'); }
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}

// ─── LECTURE PARSER ──────────────────────────────────────────────────────────
const ALL_SUBJECTS_ORDER = ['국어','수학','과학','과학 개념','영어','영어 심화','총창',
                             '음악','음악 심화','미술','실과','통교','도덕','사회','체육'];
const SUB_DISPLAY_MAP = {'통교':'통합교과','총창':'총론·창체'};
const FILE_TO_INT_MAP  = {'통합교과':'통교','총론·창체':'총창'};

const CIRCLE_MAP_JS = {'①':'1','②':'2','③':'3','④':'4','⑤':'5',
                        '⑥':'6','⑦':'7','⑧':'8','⑨':'9','⑩':'10'};
const FORBIDDEN_RE  = /[\\/:*?"<>|]/g;

function applyNaming(raw){
  let t = raw;
  for(const [c,d] of Object.entries(CIRCLE_MAP_JS)) t = t.replaceAll(c, `(${d})`);
  t = t.replace(FORBIDDEN_RE, '');
  t = t.replace(/(\d)~(\d)/g, '$1\x00$2');
  t = t.replace(/(?<!\s)\(/g, ' (');
  t = t.replace(/\s*~\s*/g, ' ~ ');
  t = t.replace(/(?<=[^\s])-(?=[^\s])/g, ' - ');
  t = t.replaceAll('\x00', '~');
  return t.replace(/  +/g, ' ').trim();
}

const META_LINE_RE = /^\s*(?:\d+\s*%|\d+\s*분|\(\s*\d+\s*분\s*\)|@?시간설정(?:\s+(?:HD|SD))*|시간|HD|SD)\s*$/;

function stripMeta(raw){
  const lines = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const kept = [];
  for(const line of lines){
    if(META_LINE_RE.test(line)) break;
    kept.push(line);
  }
  const text = kept.filter(l=>l.trim()).map(l=>l.trim()).join(' ');
  return text.replace(/  +/g,' ').trim();
}

const DATE_DUR_RE = /\d{4}-\d{1,2}-\d{1,2}[ \t]*\r?\n?[ \t]*\((\d+)분\)/;

function parseLecturesFromText(rawText){
  const text = rawText.replace(/\r\n/g,'\n').replace(/\r/g,'\n');

  // 형식C: [과목명]\nn강. 제목
  const oldResults = [];
  const PAT_C_SECTION = /^\[([^\]]+)\]\s*\n((?:\d+강\.[^\n]*\n?)+)/gm;
  for(const sec of text.matchAll(PAT_C_SECTION)){
    const rawSub = sec[1].trim();
    const sub = FILE_TO_INT_MAP[rawSub] || rawSub;
    const lines = sec[2].split('\n').filter(l=>l.trim());
    for(const line of lines){
      const lm = line.match(/^(\d+)강\.\s*(.+)/);
      if(!lm) continue;
      const k = parseInt(lm[1]);
      let title = applyNaming(lm[2].trim());
      const display = `${k}강. ${title}`;
      oldResults.push({n: k, k, subject: sub, title, duration: null, display, old: true});
    }
  }

  // 형식A
  const PAT_A_RE = /\d{4}-\d{1,2}-\d{1,2}[ \t]*\n[ \t]*\((?<dur>\d+)분\)[ \t]*(?<n>\d+)\s*강\s+(?<k>\d+)\s*강\s*:\s*\[(?<sub>[^\]]+)\][ \t]*(?<title>[^\n]*)/gm;
  const foundA = {};
  for(const m of text.matchAll(PAT_A_RE)){
    const n = parseInt(m.groups.n), k = parseInt(m.groups.k);
    foundA[`${n},${k}`] = {n, k, sub: m.groups.sub.trim(), title_raw: m.groups.title.trim(), duration: parseInt(m.groups.dur)};
  }

  // 형식B
  const PAT_B_RE = /(?<n>\d+)\s*강\s+(?<k>\d+)\s*강\s*:\s*\[(?<sub>[^\]]+)\]\s*(?<block>[\s\S]*?)(?=\n\s*(?:\d{4}-\d{1,2}-\d{1,2}|\d+\s*%|\d+\s*분\s*$|\(\s*\d+\s*분\s*\)|@?시간설정|시간\s*$|HD\s*$|SD\s*$|\d+\s*강\s+\d+\s*강\s*:)|\n*$)/gm;

  const results = {};
  for(const m of text.matchAll(PAT_B_RE)){
    const n = parseInt(m.groups.n), k = parseInt(m.groups.k);
    const key = `${n},${k}`;
    let sub, title, duration;

    if(foundA[key]){
      const r = foundA[key];
      sub = FILE_TO_INT_MAP[r.sub] || r.sub;
      if(n===k && sub==='과학') sub = '과학 개념';
      title = applyNaming(stripMeta(r.title_raw));
      duration = r.duration;
    } else {
      const block = m.groups.block;
      const durM = block.match(DATE_DUR_RE);
      duration = durM ? parseInt(durM[1]) : null;
      let title_raw = block.trim().split('\n')[0].trim();
      title_raw = title_raw.replace(/^\d{4}-\d{1,2}-\d{1,2}[ \t]*(?:\(\d+분\))?[ \t]*/,'');
      title_raw = stripMeta(title_raw);
      title = applyNaming(title_raw);
      sub = FILE_TO_INT_MAP[m.groups.sub.trim()] || m.groups.sub.trim();
      if(n===k && sub==='과학') sub = '과학 개념';
    }

    const isOld = /\(작년\)|\(구\)|작년/.test(title);
    if(isOld) title = title.replace(/\s*\(?작년\)?|\s*\(?구\)?/g,'').trim();

    const durStr = duration ? ` [${duration}분]` : '';
    const display = `${k}강. ${title}${durStr}`;

    results[key] = {n, k, subject: sub, title, duration, display, old: isOld};
  }

  const currentItems = Object.values(results).sort((a,b)=> a.n!==b.n ? a.n-b.n : a.k-b.k);
  return [...currentItems, ...oldResults];
}

function groupBySubject(items){
  const map = {};
  for(const item of items){
    if(!map[item.subject]) map[item.subject] = [];
    map[item.subject].push(item);
  }
  return map;
}

let parsedLecturesBuffer = null;

function setStatus(id, msg, type){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = msg;
  el.style.color = type==='ok'?'var(--teal)':type==='err'?'var(--red)':'var(--text3)';
}

function parseLecturesRule(){
  const input = document.getElementById('lc-input').value.trim();
  if(!input){ setStatus('lc-status','내용을 입력해주세요.','err'); return; }

  const items = parseLecturesFromText(input);
  if(!items.length){ setStatus('lc-status','파싱된 강의가 없습니다. [과목] 태그 형식을 확인하세요.','err'); return; }

  const bySubj = groupBySubject(items);
  parsedLecturesBuffer = {};
  for(const [subj, list] of Object.entries(bySubj)){
    parsedLecturesBuffer[subj] = {
      current: list.filter(i=>!i.old),
      old:     list.filter(i=>i.old)
    };
  }

  renderParsedSubjTabs();
  document.getElementById('lc-preview-wrap').style.display='block';
  setStatus('lc-status',`✓ ${items.length}개 강의 파싱 완료 (${Object.keys(bySubj).length}개 과목)`,'ok');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderParsedSubjTabs(){
  if(!parsedLecturesBuffer) return;
  const showOld = document.getElementById('lc-show-old').checked;
  const tabBar    = document.getElementById('lc-subj-tabs');
  const panelArea = document.getElementById('lc-subj-panels');
  tabBar.innerHTML = '';
  panelArea.innerHTML = '';

  const subjects = Object.keys(parsedLecturesBuffer);
  subjects.sort((a,b)=>{
    const ai = ALL_SUBJECTS_ORDER.indexOf(a), bi = ALL_SUBJECTS_ORDER.indexOf(b);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });

  subjects.forEach((subj, idx)=>{
    const data = parsedLecturesBuffer[subj];
    const newCount = data.current.length;
    const dispSubj = SUB_DISPLAY_MAP[subj]||subj;

    const tab = document.createElement('button');
    tab.className = 'stab' + (idx===0?' on':'');
    tab.textContent = `${dispSubj} (${newCount})`;
    tab.onclick = ()=>{
      document.querySelectorAll('#lc-subj-tabs .stab').forEach(t=>t.classList.remove('on'));
      document.querySelectorAll('#lc-subj-panels .lc-sp').forEach(p=>p.style.display='none');
      tab.classList.add('on');
      document.getElementById(`lc-sp-${subj}`).style.display='block';
    };
    tabBar.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'lc-sp';
    panel.id = `lc-sp-${subj}`;
    panel.style.display = idx===0?'block':'none';
    panel.style.cssText = 'white-space:pre-wrap;font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.8';

    let html = '';
    if(data.current.length){
      html += `<div style="font-size:11px;color:var(--teal);letter-spacing:.06em;margin-bottom:4px">● 올해 강의 (${data.current.length}개)</div>`;
      html += `<div style="margin-bottom:10px">${data.current.map(i=>escHtml(i.display)).join('\n')}</div>`;
    }
    if(showOld && data.old.length){
      html += `<div style="font-size:11px;color:var(--purple);letter-spacing:.06em;margin-bottom:4px">● 작년 강의 (${data.old.length}개)</div>`;
      html += `<div>${data.old.map(i=>escHtml(i.display)).join('\n')}</div>`;
    }
    if(!data.current.length && !(showOld && data.old.length))
      html='<div style="color:var(--text3);font-size:12px;padding:8px">항목 없음</div>';
    panel.innerHTML = html;
    panelArea.appendChild(panel);
  });
}

function applyParsedLectures(mode){
  if(!parsedLecturesBuffer){ toast('먼저 파싱을 실행하세요'); return; }
  const showOld = document.getElementById('lc-show-old').checked;

  // 파싱 결과를 강의 객체 배열로 변환
  const newLecs = [];
  for(const [subj, data] of Object.entries(parsedLecturesBuffer)){
    const toAdd = showOld ? [...data.current, ...data.old] : [...data.current];
    for(const item of toAdd){
      const id = `${subj}_${item.k}${item.old?'_old':''}`;
      newLecs.push({
        id, subject: subj,
        num: `${item.k}강`,
        title: item.display,
        minutes: item.duration || 0,
        term: 1, done: false, doneDate: null
      });
    }
  }

  if(mode === 'replace'){
    // 기존 완료 기록 보존
    const doneMap = {};
    state.lectures.forEach(l=>{ if(l.done) doneMap[l.id] = {done:l.done, doneDate:l.doneDate}; });
    state.lectures = newLecs.map(l=>({...l, ...(doneMap[l.id]||{})}));
    // 과목별 강의번호 순 정렬
    state.lectures.sort((a,b)=>{
      const si = SUBJ_ORDER.indexOf(a.subject), sj = SUBJ_ORDER.indexOf(b.subject);
      if(si !== sj) return si - sj;
      const ni = parseInt(a.num)||0, nj = parseInt(b.num)||0;
      return ni - nj;
    });
    toast(`✓ ${newLecs.length}개 강의로 교체 완료`);
  } else {
    // 병합: 같은 과목+번호(id)는 최신 데이터로 덮어쓰기, 없으면 추가
    const existMap = {};
    state.lectures.forEach((l,i)=>{ existMap[l.id] = i; });
    let added = 0, updated = 0;
    newLecs.forEach(l=>{
      if(l.id in existMap){
        // 덮어쓰기 (완료 기록은 유지)
        const old = state.lectures[existMap[l.id]];
        state.lectures[existMap[l.id]] = { ...l, done: old.done, doneDate: old.doneDate };
        updated++;
      } else {
        state.lectures.push(l);
        added++;
      }
    });
    // 과목별 강의번호 순 정렬
    state.lectures.sort((a,b)=>{
      const si = SUBJ_ORDER.indexOf(a.subject), sj = SUBJ_ORDER.indexOf(b.subject);
      if(si !== sj) return si - sj;
      const ni = parseInt(a.num)||0, nj = parseInt(b.num)||0;
      return ni - nj;
    });
    toast(`✓ ${added}개 추가, ${updated}개 업데이트됨`);
  }

  saveState();
  closeModal('modal-lec-parser');
  renderLectures();
  // 오늘 탭 강의 체크 반영
  if (currentPage === 'today') { renderTodayLecs(); renderTodayTabs(); }
}
