<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✍🏻 2027 IMGO TF</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8f060">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2027 IMGO">
<link rel="apple-touch-icon" href="icons/icon_192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1a1a;--bg2:#222222;--bg3:#2a2a2a;--bg4:#323232;--bg5:#3a3a3a;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);--border3:rgba(255,255,255,0.28);
  --text:#f0f0f0;--text2:#c0c0c0;--text3:#888;--text4:#555;
  --accent:#c8f060;--accent2:rgba(200,240,96,0.15);--accent3:rgba(200,240,96,0.08);
  --red:#ff5f5f;--amber:#ffb347;--blue:#6eb5ff;--purple:#b8a5ff;--teal:#5ecfb0;--pink:#ff8fa3;
  --r:10px;--rs:6px;
}
body.light{
  --bg:#f7f7f2;--bg2:#eeeee9;--bg3:#ffffff;--bg4:#f2f2ed;--bg5:#e8e8e3;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--border3:rgba(0,0,0,0.22);
  --text:#1a1a1a;--text2:#444;--text3:#888;--text4:#bbb;
  --accent:#5a8a10;--accent2:rgba(90,138,16,0.1);--accent3:rgba(90,138,16,0.06);
  --red:#d93025;--amber:#c87800;--blue:#1a6fc4;--purple:#6b4fc4;--teal:#1a8a6a;--pink:#c4204a;
}
.theme-btn{font-size:16px;padding:4px 8px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);transition:.15s;line-height:1;cursor:pointer}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Noto Sans KR',sans-serif;font-size:14px}

/* ── HEADER ── */
.hdr{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:200}
.logo{font-weight:700;font-size:15px;color:var(--accent);letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:10px}
.dday{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--accent2);border:1px solid var(--accent);color:var(--accent);padding:3px 12px;border-radius:20px}

/* ── NAV ── */
.nav{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.ntab:hover{color:var(--text2)}
.ntab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ── MAIN ── */
.main{padding:20px 20px 80px;max-width:900px}
.page{display:none}.page.on{display:block}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.12em;color:#fff;text-transform:uppercase;margin-bottom:14px}
body.light .sec-title{color:var(--text3)}

/* ── TERM TABS ── */
.term-tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.ttab{padding:6px 16px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:none;transition:.15s}
.ttab:hover{border-color:var(--accent);color:var(--accent)}
.ttab.on{background:var(--accent2);border-color:var(--accent);color:var(--accent)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sc-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500}
.sc-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── CALENDAR ── */
.cal-wrap{margin-bottom:26px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hd{text-align:center;font-size:11px;color:var(--text2);padding:6px 2px;font-weight:500}
.cc{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);padding:6px 5px;min-height:64px;height:auto}
.cc.today{border-color:var(--accent);background:var(--accent3)}
.cc.sday{border-color:rgba(94,207,176,.3)}
.cc.empty{background:transparent;border-color:transparent}
.cd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-bottom:3px}
body.light .cal-hd{color:var(--text3)}
body.light .cc{background:var(--bg3);border-color:var(--border)}
body.light .cd{color:var(--text3)}
.cc.today .cd{color:var(--accent);font-weight:500}
.cc-sub{font-size:9px;color:var(--teal);line-height:1.35;word-break:keep-all;overflow-wrap:break-word}
.cc-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);margin-top:1px}

/* ── SCHEDULE ── */
.wdiv{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;padding:8px 0 9px;border-top:1px solid var(--border);margin-bottom:6px}
.wdiv:first-child{border-top:none}
.sr{display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:10px;padding:9px 12px;border-radius:var(--rs);border:1px solid transparent;transition:.12s}
.sr:hover{background:var(--bg3);border-color:var(--border)}
.sr.today-row{background:var(--accent3);border-color:rgba(200,240,96,.15)}
.sr-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap}
.sr-day{font-size:10px;color:var(--text3)}
.sr-sub{font-size:13px;color:var(--text)}
.sr-note{font-size:11px;color:var(--text3)}
.sr-note-hi{font-size:11px;color:var(--amber)}
.sr-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--teal);white-space:nowrap;text-align:right}
.sr-time.pass{color:var(--text3)}
.sr-time.text{color:var(--amber);font-family:'Noto Sans KR',sans-serif}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:7px;vertical-align:middle;flex-shrink:0;margin-top:-1px}
.dot-mon{background:var(--accent)}.dot-wed{background:var(--blue)}.dot-fri{background:var(--purple)}.dot-sun{background:var(--amber)}.dot-sat{background:var(--red)}.dot-else{background:var(--teal)}

/* ── LECTURES ── */
.subj-tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.stab{padding:5px 13px;font-size:12px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:none;transition:.12s}
.stab:hover{border-color:var(--blue);color:var(--blue)}
.stab.on{background:rgba(110,181,255,.1);border-color:var(--blue);color:var(--blue)}
.lec-list{display:grid;grid-template-columns:1fr;gap:5px}
@media(min-width:560px){.lec-list{grid-template-columns:repeat(2,1fr)}}
.li{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);transition:.12s}
.li:hover{border-color:var(--border3);background:var(--bg5)}
.li.old{background:var(--bg3);border-color:var(--border)}
.li.old:hover{border-color:var(--border2)}
.li.old .lnum{color:var(--amber)}
body.light .li{background:var(--bg3);border-color:var(--border)}
body.light .li:hover{background:var(--bg4);border-color:var(--border2)}
body.light .li.old{background:var(--bg4);border-color:var(--border2)}
body.light .li.old:hover{background:var(--bg5);border-color:var(--border3)}
.lnum{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);white-space:nowrap;padding-top:2px;min-width:34px}
.ltitle{font-size:12px;color:var(--text);line-height:1.5}
.old-badge{font-size:9px;background:rgba(255,179,71,.15);color:var(--amber);border:1px solid rgba(255,179,71,.3);padding:1px 6px;border-radius:10px;margin-left:6px;white-space:nowrap;vertical-align:middle}
.lec-old-toggle{display:flex;align-items:center;gap:9px;margin:-4px 0 16px;color:var(--text2);font-size:12px}
.toggle-wrap{position:relative;display:inline-block;width:42px;height:24px;flex:0 0 auto}
.toggle-wrap input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--bg4);border:1px solid var(--border2);border-radius:999px;transition:.18s}
.slider:before{content:"";position:absolute;width:18px;height:18px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.toggle-wrap input:checked + .slider{background:var(--amber2,rgba(255,179,71,.15));border-color:rgba(255,179,71,.45)}
.toggle-wrap input:checked + .slider:before{transform:translateX(18px);background:var(--amber)}

/* ── NOTICE ── */
.nc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.nc-stitle{font-size:11px;color:#fff;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;font-weight:700}
body.light .nc-stitle{color:var(--text3)}
.nr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.nr:last-child{border-bottom:none;padding-bottom:0}
.nl{color:var(--text2)}.nv{font-weight:500}.nv.a{color:var(--accent)}
.fine-row{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--bg4);border-radius:var(--rs);margin-bottom:5px}
.fine-icon{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px}
.fine-name{font-size:13px;flex:1}.fine-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.link-card{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);text-decoration:none;transition:.15s;margin-bottom:7px}
.link-card:hover{border-color:var(--accent)}
.link-title{font-size:13px;color:var(--text)}.link-url{font-size:11px;color:var(--text3);margin-top:1px;font-family:'JetBrains Mono',monospace}
.link-arr{color:var(--text3);margin-left:auto;font-size:16px}
.unable-list{display:flex;flex-direction:column;gap:5px}
.ui-item{display:flex;align-items:center;gap:9px;padding:8px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text2)}
.ucnt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);min-width:22px;text-align:center}


/* scrollbar */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:767px){body{zoom:0.75}}

/* ── EXAMS ── */
.exam-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.03em;white-space:nowrap}
.badge-complete{background:rgba(94,207,176,.15);color:var(--teal);border:1px solid rgba(94,207,176,.3)}
.badge-plan{background:rgba(200,240,96,.12);color:var(--accent);border:1px solid rgba(200,240,96,.25)}
.badge-unknown{background:rgba(136,136,136,.12);color:var(--text3);border:1px solid rgba(136,136,136,.2)}
.exam-cnt{font-family:'JetBrains Mono',monospace;font-size:11px;min-width:28px;text-align:right;padding-top:2px}
.exam-cnt.cnt-complete{color:var(--teal)}
.exam-cnt.cnt-plan{color:var(--accent)}
.exam-cnt.cnt-unknown{color:var(--text3)}
.exam-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:5px;transition:.12s}
.exam-row:hover{border-color:var(--border2)}
.exam-cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);min-width:28px;text-align:right;padding-top:2px}
.exam-name{font-size:13px;color:var(--text);flex:1;line-height:1.5}
.exam-essay{font-size:10px;color:var(--amber);background:rgba(255,179,71,.15);border:1px solid rgba(255,179,71,.3);padding:1px 6px;border-radius:8px;white-space:nowrap;margin-left:4px;vertical-align:middle}
</style>
</head>

// ==================== D-DAY ====================
function updateDday(){
  const parts = (S.dday||'2026-11-08').split('-');
  const dd = new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((dd-today)/(864e5));
  const badge = document.getElementById('ddayBadge');
  badge.textContent = diff>0?'D-'+diff:diff===0?'D-DAY ★':'D+'+Math.abs(diff);
}

// ==================== STATS ====================
function isStudyTimeValue(v){
  return /^\d+:\d{1,2}$/.test(String(v||'').trim());
}
function studyTimeMins(v){
  if(!isStudyTimeValue(v)) return 0;
  const p=String(v).trim().split(':');
  return parseInt(p[0],10)*60+parseInt(p[1],10);
}
function buildStats(t){
  const td = S.schedule[t]||[];
  let total=0,done=0,totalMins=0;
  td.forEach(w=>w.items.forEach(it=>{
    if(it.date==='-')return; total++;
    if(isStudyTimeValue(it.time)){done++;totalMins+=studyTimeMins(it.time);}
  }));
  const h=Math.floor(totalMins/60),m=totalMins%60;
  const period = ((S.termPeriods&&S.termPeriods[t])||'미정').replace(' ~ ','<br>~ ');
  document.getElementById('statsRow').innerHTML=`
    <div class="sc"><div class="sc-label">기간</div><div class="sc-val" style="font-size:11px;padding-top:5px;color:var(--text2);line-height:1.4">${period}</div><div class="sc-sub">&nbsp;</div></div>
    <div class="sc"><div class="sc-label">전체 회차</div><div class="sc-val">${total}</div><div class="sc-sub">회</div></div>
    <div class="sc"><div class="sc-label">기록 완료</div><div class="sc-val" style="color:var(--accent)">${done}</div><div class="sc-sub">/ ${total}</div></div>
    <div class="sc"><div class="sc-label">총 스터디 시간</div><div class="sc-val">${h}<span style="font-size:13px;color:var(--text3)">h</span>${m}<span style="font-size:13px;color:var(--text3)">m</span></div><div class="sc-sub">기록 기준</div></div>`;
}

// ==================== CALENDAR ====================
const dotColors={월:'var(--accent)',수:'var(--blue)',금:'var(--purple)',일:'var(--amber)',토:'var(--red)',화:'var(--teal)',목:'var(--pink)'};
function buildCalendar(t){
  const today=new Date();today.setHours(0,0,0,0);
  const studyMap={};
  (S.schedule[t]||[]).forEach(w=>w.items.forEach(it=>{
    if(it.date==='-')return;
    const p=it.date.split('/');
    const yr= parseInt(p[0])>=6?2026:2027;
    const key=`${yr}-${parseInt(p[0])-1}-${parseInt(p[1])}`;
    studyMap[key]={subject:it.subject,time:it.time};
  }));
  const start=new Date(today);
  const dow=start.getDay();
  start.setDate(start.getDate()+(dow===0?-6:1-dow));
  const dayL=['월','화','수','목','금','토','일'];
  let html='<div class="cal-grid">';
  dayL.forEach(l=>html+=`<div class="cal-hd">${l}</div>`);
  for(let i=0;i<14;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const isT=d.getTime()===today.getTime();
    const info=studyMap[key];
    let cls='cc'+(isT?' today':info?' sday':'');
    html+=`<div class="${cls}"><div class="cd">${d.getMonth()+1}/${d.getDate()}</div>`;
    if(info){
      html+=`<div class="cc-sub">${info.subject}</div>`;
      if(info.time){
        const cls=isStudyTimeValue(info.time)?'cc-time':'cc-time sr-note-hi';
        html+=`<div class="${cls}">${info.time}</div>`;
      }
    }
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('calGrid').innerHTML=html;
}

// ==================== SCHEDULE LIST ====================
function buildSchedule(t){
  const td=S.schedule[t]||[];
  const ddayParts=(S.dday||'2026-11-14').split('-');
  const ddayDate=new Date(parseInt(ddayParts[0]),parseInt(ddayParts[1])-1,parseInt(ddayParts[2]));
  const today=new Date();today.setHours(0,0,0,0);

  // Flatten all items with their date objects, sorted
  const allItems=[];
  td.forEach(w=>w.items.forEach(it=>{
    if(it.date==='-'){allItems.push({item:it,dateObj:null});return;}
    const p=it.date.split('/');
    const mo=parseInt(p[0]),da=parseInt(p[1]);
    const yr=(mo>=6&&mo<=12)?2026:2027;
    const dateObj=new Date(yr,mo-1,da);
    dateObj.setHours(0,0,0,0);
    allItems.push({item:it,dateObj});
  }));
  allItems.sort((a,b)=>{
    if(!a.dateObj) return 1;
    if(!b.dateObj) return -1;
    return a.dateObj-b.dateObj;
  });

  // Compute D-day for upcoming Monday
  function getDdayForMonday(mondayDate){
    mondayDate.setHours(0,0,0,0);
    const diff=Math.ceil((ddayDate-mondayDate)/(864e5));
    return diff>0?'D-'+diff:diff===0?'D-DAY':'D+'+ Math.abs(diff);
  }

  let html='';
  let lastWeekSunday=null; // tracks the Sunday of the current week

  // Helper: get Monday of the week containing a date (Mon=start)
  function getMondayOf(d){
    const day=d.getDay(); // 0=Sun
    const diff=day===0?-6:1-day;
    const mon=new Date(d);
    mon.setDate(d.getDate()+diff);
    mon.setHours(0,0,0,0);
    return mon;
  }

  for(const {item,dateObj} of allItems){
    if(!dateObj){
      html+=`<div class="sr"><div class="sr-sub" style="color:var(--text3);grid-column:1/-1">${item.subject}</div></div>`;
      continue;
    }
    const monday=getMondayOf(dateObj);
    const mondayKey=monday.getTime();

    if(lastWeekSunday===null||mondayKey>lastWeekSunday){
      // Insert week divider before this item
      const dday=getDdayForMonday(new Date(monday));
      const mondayLabel=`${monday.getMonth()+1}/${monday.getDate()}`;
      html+=`<div class="wdiv">— ${dday} <span style="color:var(--text4);font-size:10px">(${mondayLabel}~)</span></div>`;
      lastWeekSunday=mondayKey;
    }

    const dc=dotColors[item.day]||'var(--teal)';
    const isToday=dateObj.getTime()===today.getTime();
    const rowCls=isToday?' today-row':'';

    // parse subject and note from item
    // note is in item.note field (orange color)
    const hasNumericTime=isStudyTimeValue(item.time);
    const hasTextTime=item.time&&!hasNumericTime;
    const noteH=item.note?`<span class="sr-note-hi"> · ${item.note}</span>`:'';
    const timeH=hasNumericTime?`<div class="sr-time">[${item.time}]</div>`:
                hasTextTime?`<div class="sr-time text">${item.time}</div>`:
                `<div class="sr-time pass">—</div>`;

    html+=`<div class="sr${rowCls}"><div class="sr-date"><span class="dot" style="background:${dc}"></span>${item.date}<span class="sr-day">(${item.day})</span></div><div class="sr-sub">${item.subject}${noteH}</div>${timeH}</div>`;
  }
  document.getElementById('scheduleList').innerHTML=html||'<div style="color:var(--text3);padding:20px 0;font-size:13px">일정이 없습니다.</div>';
}

function calcLectureMins(lecs){
  let t=0;
  lecs.forEach(l=>{ const m=l.title.match(/\[(\d+)분\]/); if(m) t+=parseInt(m[1]); });
  return t;
}
function renderLectures(){
  const showOld=document.getElementById('showOld')?.checked!==false;
  const lecs=S.lectures[currentSubject]||[];
  const currentLecs=lecs.filter(l=>!l.old);
  const oldLecs=lecs.filter(l=>l.old);
  const visible=showOld?lecs:[...currentLecs];
  const mins=calcLectureMins(visible);
  let header='';
  if(mins>0){
    const h=Math.floor(mins/60),m=mins%60;
    const ts=h>0?(m>0?h+'시간 '+m+'분':h+'시간'):m+'분';
    header='<div style="font-size:12px;color:var(--teal);margin-bottom:12px;font-family:\'JetBrains Mono\',monospace">⏱ 강의시간 합산: <b>'+ts+'</b> <span style="color:var(--text3);font-size:11px">('+mins+'분)</span></div>';
  }
  let html='';
  if(currentLecs.length){
    html+='<div style="font-size:10px;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;padding:4px 2px 6px;grid-column:1/-1">● 올해 강의</div>';

      html+='<div class="li"><span class="lnum">'+l.num+'</span><span class="ltitle">'+t+'</span></div>';
    });
  }
  if(showOld&&oldLecs.length){
    html+='<div style="font-size:10px;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;padding:12px 2px 6px;grid-column:1/-1;border-top:1px solid var(--border);margin-top:8px">● 작년 강의</div>';
    oldLecs.forEach(l=>{
      const t = (l.title||'').replace(/^\d+강\.\s*/,'');
      html+='<div class="li old"><span class="lnum">'+l.num+'</span><span class="ltitle">'+t+'<span class="old-badge">작년</span></span></div>';
    });
  }
  document.getElementById('lectureList').innerHTML=header+(html||'<div style="color:var(--text3);font-size:13px;padding:12px 0">강의가 없습니다.</div>');
}

  (S.notice.fines||[]).forEach(f=>{
    const col=f.amount>=50000?'var(--red)':'var(--amber)';
    fh+=`<div class="fine-row"><div class="fine-icon" style="background:${f.amount>=50000?'rgba(255,95,95,.15)':'rgba(255,179,71,.15)'}">💸</div><div class="fine-name">${f.name}</div><div class="fine-amt" style="color:${col}">${f.amount.toLocaleString()}원</div></div>`;
  });
  document.getElementById('nt-fine-view').innerHTML=fh;
  // links
  let lh='';
  (S.notice.links||[]).forEach(l=>{lh+=`<a class="link-card" href="${l.url}" target="_blank"><div><div class="link-title">${l.title}</div><div class="link-url">${l.url.replace(/https?:\/\//,'').split('/')[0]}</div></div><div class="link-arr">↗</div></a>`;});
  document.getElementById('nt-link-view').innerHTML=lh;

}



// ==================== EXAMS ====================
const STATUS_CLASS = {'완료':'badge-complete','예정':'badge-plan','미정':'badge-unknown'};
const COUNT_CLASS  = {'완료':'cnt-complete','예정':'cnt-plan','미정':'cnt-unknown'};

function renderExams(){
  const exams = S.exams||[];
  const updated = S.examsUpdated||'';
  const label = document.getElementById('exam-updated-label');
  if(label) label.textContent = updated ? '모의고사 현황 ('+updated+')' : '모의고사 현황';

  const listEl = document.getElementById('examList');
  if(!listEl) return;
  if(!exams.length){
    listEl.innerHTML='<div style="color:var(--text3);font-size:13px;padding:12px 0">등록된 모의고사가 없습니다.</div>';
    return;
  }
  listEl.innerHTML = exams.map(e=>{
    const sc = STATUS_CLASS[e.status]||'badge-unknown';
    const cc = COUNT_CLASS[e.status]||'cnt-unknown';
    const essay = e.essay ? '<span class="exam-essay">논술有</span>' : '';
    return `<div class="exam-row"><span class="exam-cnt ${cc}">[${e.count}]</span><span class="exam-badge ${sc}" style="align-self:center;flex-shrink:0">${e.status}</span><span class="exam-name">${e.name}${essay}</span></div>`;
  }).join('');
}
// ==================== PAGE NAV ====================
function goPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  if(name==='lectures')buildSubjectTabs();
  if(name==='exams')renderExams();
}

// ==================== THEME ====================
function toggleTheme(){
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeToggleBtn').textContent = isLight ? '🌞' : '🌙';
  localStorage.setItem('imgo_theme', isLight ? 'light' : 'dark');
}
(function initTheme(){
  if(localStorage.getItem('imgo_theme')==='light'){
    document.body.classList.add('light');
    const btn = document.getElementById('themeToggleBtn');
    if(btn) btn.textContent = '🌞';
  }
})();

// ==================== INIT ====================
(async()=>{
  await loadData();
  updateDday();
  buildTermTabs();
  showTerm(1);
  renderNoticeView();
  buildSubjectTabs();
  renderExams();
})();

// ==================== SERVICE WORKER ====================
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js')
      .then(r=>console.log('[SW] registered:', r.scope))
      .catch(e=>console.warn('[SW] registration failed:', e));
  });
}
</script>
