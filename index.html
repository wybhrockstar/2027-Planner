<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2027 IMGO Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141414;--bg2:#1c1c1c;--bg3:#242424;--bg4:#2c2c2c;--bg5:#353535;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--border3:rgba(255,255,255,0.24);
  --text:#efefef;--text2:#b8b8b8;--text3:#777;--text4:#444;
  --accent:#c8f060;--accent2:rgba(200,240,96,0.12);--accent3:rgba(200,240,96,0.06);
  --red:#ff5a5a;--amber:#ffb347;--blue:#6eb5ff;--purple:#b8a5ff;--teal:#5ecfb0;--pink:#ff8fa3;--orange:#ff9f43;
  --r:10px;--rs:6px;
}
body.light{
  --bg:#f5f5f0;--bg2:#ebebeb;--bg3:#ffffff;--bg4:#f0f0eb;--bg5:#e6e6e1;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.2);
  --text:#1a1a1a;--text2:#444;--text3:#888;--text4:#bbb;
  --accent:#5a8a10;--accent2:rgba(90,138,16,0.1);--accent3:rgba(90,138,16,0.05);
  --red:#d93025;--amber:#c87800;--blue:#1a6fc4;--purple:#6b4fc4;--teal:#1a8a6a;--pink:#c4204a;--orange:#c86000;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 10px;outline:none;transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}

/* HEADER */
.hdr{border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:200}
.logo{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;color:var(--accent);letter-spacing:.02em}
.hdr-r{display:flex;align-items:center;gap:8px}
.dday-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--accent2);border:1px solid var(--accent);color:var(--accent);padding:3px 10px;border-radius:20px}
.theme-btn{font-size:15px;padding:4px 7px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);transition:.15s;line-height:1}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.backup-btn{font-size:15px;padding:4px 7px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);transition:.15s;line-height:1}
.backup-btn:hover{border-color:var(--accent);color:var(--accent)}

/* NAV */
.nav{display:flex;padding:0 12px;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:45px;z-index:190}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;flex-shrink:0}
.ntab:hover{color:var(--text2)}
.ntab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{padding:20px 16px 90px;max-width:860px;margin:0 auto}
.page{display:none}.page.on{display:block}

/* SECTION */
.sec{margin-bottom:24px}
.sec-hd{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--text);text-transform:uppercase;margin-bottom:12px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.card+.card{margin-top:10px}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;align-items:stretch}
@media(min-width:480px){.stats{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;display:flex;flex-direction:column}
.sc-lbl{font-size:10px;color:var(--text);margin-bottom:4px;letter-spacing:.04em;font-weight:600}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.sc-sub{font-size:10px;color:var(--text);margin-top:3px;opacity:.7}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-lbl{font-size:11px;color:var(--text3);margin-bottom:5px;display:block}
.form-group{margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;border:none;transition:.15s;cursor:pointer}
.btn-primary{background:var(--accent);color:#0a1a00;font-weight:700}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.3);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12px}

/* PROGRESS BAR */
.pbar-wrap{margin-bottom:14px}
.pbar-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.pbar-name{font-size:13px;font-weight:500}
.pbar-pct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}
.pbar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s cubic-bezier(.4,0,.2,1)}
.pbar-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* LECTURE LIST */
.lec-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.lec-item:last-child{border-bottom:none}
.lec-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border3);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.lec-check.done{background:var(--accent);border-color:var(--accent)}
.lec-check.done::after{content:'✓';font-size:11px;color:#0a1a00;font-weight:700}
.lec-info{flex:1;min-width:0}
.lec-title{font-size:13px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lec-title.done-txt{color:var(--text3);text-decoration:line-through}
.lec-meta{font-size:10px;color:var(--text3);margin-top:1px}
.lec-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);margin-left:auto;flex-shrink:0}

/* SUBJ TABS */
.subj-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.stab{padding:5px 12px;font-size:12px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:none;transition:.12s;white-space:nowrap}
.stab:hover{border-color:var(--blue);color:var(--blue)}
.stab.on{background:rgba(110,181,255,.12);border-color:var(--blue);color:var(--blue)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-bg{align-items:center}}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 20px 32px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--r);padding:24px;max-height:80vh}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;line-height:1;padding:2px 6px;border-radius:6px}
.modal-close:hover{color:var(--text);background:var(--bg4)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:.25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV for mobile */
@media(max-width:600px){
  .nav{display:none}
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border2);z-index:190;padding-bottom:env(safe-area-inset-bottom)}
  .btab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;background:none;border:none;color:var(--text3);font-size:9px;font-family:'Noto Sans KR',sans-serif;gap:3px;transition:.12s}
  .btab.on{color:var(--accent)}
  .btab-icon{font-size:18px;line-height:1}
}
@media(min-width:601px){.bnav{display:none}}

/* LECS TODAY CHECKBOXES */
.today-lec-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.today-lec-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg4);cursor:pointer;transition:.12s}
.today-lec-row:hover{border-color:var(--accent)}
.today-lec-row.done{border-color:rgba(200,240,96,.3);background:var(--accent3)}
.today-lec-cb{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.today-lec-row.done .today-lec-cb{background:var(--accent);border-color:var(--accent);color:#0a1a00;font-weight:700}
.today-lec-text{font-size:12px;line-height:1.4;flex:1}
.today-lec-min{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0}

/* STUDY RESULT BUTTONS */
.sr-btns{display:flex;gap:8px;margin-top:6px}
.sr-btn{flex:1;padding:10px 8px;border-radius:var(--rs);border:1.5px solid var(--border2);background:none;font-size:15px;font-weight:700;color:var(--text3);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.sr-btn:hover{border-color:var(--border3);color:var(--text)}
.sr-btn.active-o{border-color:var(--teal);background:rgba(94,207,176,.15);color:var(--teal)}
.sr-btn.active-d{border-color:var(--amber);background:rgba(255,179,71,.15);color:var(--amber)}
.sr-btn.active-x{border-color:var(--red);background:rgba(255,90,90,.15);color:var(--red)}

/* STUDY CHECKLIST in log modal */
.study-checklist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.study-check-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg4);border-radius:var(--rs);border:1px solid var(--border)}
.study-check-item input[type=checkbox]{width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
.study-check-item input[type=text]{font-size:12px;background:none;border:none;padding:0;color:var(--text)}
.study-check-item input[type=text]:focus{border:none;outline:none}

/* TERM PROGRESS BLOCK */
.term-prog-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.term-prog-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.term-prog-name{font-size:13px;font-weight:600}
.term-prog-pct{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.term-prog-dates{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}
.term-prog-days{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;text-align:right}

/* TERM SUBTABS */
.term-subtabs{display:flex;gap:4px;margin-bottom:16px}
.term-stab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border-radius:var(--rs);border:1px solid var(--border2);color:var(--text2);background:none;transition:.12s;text-align:center;cursor:pointer}
.term-stab:hover{border-color:var(--accent);color:var(--accent)}
.term-stab.on{background:var(--accent2);border-color:var(--accent);color:var(--accent)}

/* PROGRESS TABLE (잔디 대체) */
.prog-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:10px}
.prog-table{border-collapse:collapse;font-size:11px;min-width:100%}
.prog-table th{padding:5px 6px;text-align:center;font-weight:600;color:var(--text3);font-size:10px;background:var(--bg4);border:1px solid var(--border);white-space:nowrap;position:sticky;left:0;z-index:2}
.prog-table td{padding:5px 6px;border:1px solid var(--border);text-align:center;white-space:nowrap;min-width:38px;cursor:pointer;transition:.1s;position:relative}
.prog-table td:hover{filter:brightness(1.15)}
.prog-table td.future{background:var(--bg4)!important;color:var(--text4)!important;cursor:default}
.prog-table td.today-col{outline:2px solid var(--accent);outline-offset:-2px}
.prog-table .row-label{font-size:10px;font-weight:600;color:var(--text3);background:var(--bg4);padding:5px 8px;text-align:left;white-space:nowrap;border:1px solid var(--border);position:sticky;left:0;z-index:2}
.prog-table .week-sep{border-left:2px solid var(--border2)!important}
.prog-table .date-row th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--text3);background:var(--bg4);padding:3px 6px}
/* PROGRESS TABLE (잔디 대체) */
.prog-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:10px}
.prog-table{border-collapse:collapse;font-size:11px;min-width:100%}
.prog-table th{padding:5px 6px;text-align:center;font-weight:600;color:var(--text3);font-size:10px;background:var(--bg4);border:1px solid var(--border);white-space:nowrap;position:sticky;left:0;z-index:2}
.prog-table td{padding:5px 6px;border:1px solid var(--border);text-align:center;white-space:nowrap;min-width:38px;cursor:pointer;transition:.1s;position:relative}
.prog-table td:hover{filter:brightness(1.15)}
.prog-table td.future{background:var(--bg4)!important;color:var(--text4)!important;cursor:default}
.prog-table td.today-col{outline:2px solid var(--accent);outline-offset:-2px}
.prog-table .row-label{font-size:10px;font-weight:600;color:var(--text3);background:var(--bg4);padding:5px 8px;text-align:left;white-space:nowrap;border:1px solid var(--border);position:sticky;left:0;z-index:2}
.prog-table .week-sep{border-left:2px solid var(--border2)!important}
.prog-table .date-row th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--text3);background:var(--bg4);padding:3px 6px}
/* GRASS SUBTABLE (새 레이아웃) */
.grass-subtable{border-collapse:collapse;font-size:11px;width:100%;table-layout:fixed;font-family:'Noto Sans KR',sans-serif}
.grass-subtable th{padding:4px 2px;text-align:center;font-weight:600;color:var(--text);font-size:9px;background:var(--bg4);border:1px solid var(--border);white-space:nowrap}
.grass-subtable td{padding:4px 2px;border:1px solid var(--border);text-align:center;white-space:nowrap;cursor:pointer;transition:.1s;position:relative;overflow:hidden;font-size:10px}
.grass-subtable td:hover{filter:brightness(1.15)}
.grass-subtable td.future{background:var(--bg4)!important;color:var(--text4)!important;cursor:default}
.grass-subtable td.today-col{outline:2px solid var(--accent);outline-offset:-2px}
.grass-subtable .row-label{font-size:9px;font-weight:400;color:var(--text);background:var(--bg4);padding:4px 4px;text-align:center;white-space:nowrap;border:1px solid var(--border);width:4.8em;min-width:4.8em}
.grass-subtable .week-sep{border-left:2px solid var(--border2)!important}
.grass-subtable .date-row th{font-family:'Noto Sans KR',sans-serif;font-size:8px;font-weight:500;color:var(--text);background:var(--bg4);padding:2px 2px}
.grass-block{margin-bottom:10px;overflow:hidden}
.cell-o{background:rgba(94,207,176,.25);color:#5ecfb0}
.cell-d{background:rgba(255,179,71,.2);color:#ffb347}
.cell-x{background:rgba(255,90,90,.18);color:#ff5a5a}
.cell-none{background:rgba(255,255,255,.03);color:var(--text4)}
.cell-skip{background:transparent;color:var(--text4)}
.cell-blank{background:transparent!important;border-color:transparent!important;cursor:default!important;pointer-events:none}

/* SUBJ INLINE PROGRESS (강의탭) */
.subj-inline-grid{display:flex;flex-direction:column;gap:7px}
.subj-inline-row{display:flex;align-items:center;gap:8px}
.subj-inline-name{font-size:12px;font-weight:500;width:76px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subj-inline-bar{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.subj-inline-fill{height:100%;border-radius:4px;transition:width .5s}
.subj-inline-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;width:90px;text-align:right}

/* LOG TAG */
.log-data{display:flex;flex-wrap:wrap;gap:5px}
.log-tag{font-size:10px;padding:3px 5px;border-radius:8px;background:var(--bg4);border:1px solid var(--border);text-align:center;white-space:nowrap}
.log-tag.study{color:var(--accent);border-color:rgba(200,240,96,.3)}
.log-tag.sleep{color:var(--blue);border-color:rgba(110,181,255,.3)}
.log-tag.kcal{color:var(--orange);border-color:rgba(255,159,67,.3)}
.log-tag.sr-o{color:var(--teal);border-color:rgba(94,207,176,.3)}
.log-tag.sr-d{color:var(--amber);border-color:rgba(255,179,71,.3)}
.log-tag.sr-x{color:var(--red);border-color:rgba(255,90,90,.3)}

/* PLANNER SUBTABS */
.planner-subtabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.planner-stab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;transition:.15s;cursor:pointer}
.planner-stab:hover{color:var(--text)}
.planner-stab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* PLAN TERM BLOCK */
.term-block{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.term-hd{padding:12px 16px;background:var(--bg4);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.term-hd-name{font-size:13px;font-weight:600}
.term-hd-dates{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.term-body{padding:14px 16px}

/* WEEK SCHEDULE TABLE */
.schedule-table{width:100%;border-collapse:collapse;font-size:11px}
.schedule-table th{padding:5px 4px;text-align:center;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px}
.schedule-table td{padding:4px;border:1px solid var(--border);text-align:center;min-width:0;cursor:pointer;transition:.12s;border-radius:0}
.schedule-table td:hover{background:var(--bg4)}
.schedule-table td.has-content{background:var(--accent3);color:var(--accent)}
.sch-time-col{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);background:var(--bg4)!important;cursor:default!important}

/* REPORT CHARTS */
.chart-wrap{position:relative;height:160px;margin-top:6px}
canvas{width:100%!important}
.report-toggle{display:flex;gap:0;background:var(--bg4);border-radius:var(--r);padding:3px;margin-bottom:16px;width:fit-content}
.report-tog-btn{padding:6px 20px;border-radius:calc(var(--r) - 3px);font-size:13px;font-weight:500;border:none;background:none;color:var(--text3);cursor:pointer;transition:.15s}
.report-tog-btn.on{background:var(--bg3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.report-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.report-nav-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);padding:4px 10px;font-size:14px;cursor:pointer}
.report-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.report-nav-lbl{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text2);flex:1;text-align:center}

/* EMPTY STATE */
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:13px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* TODO LIST */
.todo-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg4);border-radius:var(--rs);border:1px solid var(--border)}
.todo-item.done-item{opacity:.5}
.todo-item input[type=checkbox]{width:14px;height:14px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
.todo-item-text{flex:1;font-size:12px;cursor:pointer}
.todo-item-text.done-text{text-decoration:line-through;color:var(--text3)}
.todo-del{background:none;border:none;color:var(--text4);font-size:13px;padding:0 4px;cursor:pointer;transition:.12s}
.todo-del:hover{color:var(--red)}
.todo-add-row{display:flex;gap:6px;margin-top:8px}
.todo-add-row input{font-size:12px}

/* SCORE TABLE */
.score-table{width:100%;border-collapse:collapse}
.score-table th{font-size:10px;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
.score-table td{padding:8px 8px;border-bottom:1px solid var(--border);font-size:13px}
.score-pct{font-family:'JetBrains Mono',monospace;font-size:12px}
.score-bar-mini{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px;width:100px}
.score-bar-fill{height:100%;border-radius:2px;background:var(--accent)}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- MODAL: Daily Log -->
<div id="modal-log" class="modal-bg">
<div class="modal">
  <div class="modal-hd">
    <div class="modal-title" id="modal-log-title">오늘 기록 입력</div>
    <button class="modal-close" id="btn-close-log">✕</button>
  </div>
  <div class="form-row">
    <div>
      <label class="form-lbl">기상 시간</label>
      <input type="time" id="inp-wake" placeholder="06:30">
    </div>
    <div>
      <label class="form-lbl">취침 시간</label>
      <input type="time" id="inp-sleep" placeholder="23:00">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label class="form-lbl">운동 (칼로리, kcal)</label>
      <input type="number" id="inp-kcal" placeholder="200">
    </div>
    <div>
      <label class="form-lbl">공부시간 (H:MM)</label>
      <input type="text" id="inp-study" placeholder="7:00">
    </div>
  </div>
  <!-- 스터디 결과 (월수금일만 표시) -->
  <div class="form-group" id="sr-group" style="display:none">
    <label class="form-lbl">스터디 결과</label>
    <div class="sr-btns">
      <button class="sr-btn" id="sr-o" onclick="setSR('O')">
        <svg viewBox="0 0 100 100" style="width:1em;height:1em;display:inline-block;vertical-align:middle"><circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="12"/></svg>
      </button>
      <button class="sr-btn" id="sr-d" onclick="setSR('△')">
        <svg viewBox="0 0 100 100" style="width:1em;height:1em;display:inline-block;vertical-align:middle"><polygon points="50,15 15,85 85,85" fill="none" stroke="currentColor" stroke-width="12" stroke-linejoin="round"/></svg>
      </button>
      <button class="sr-btn" id="sr-x" onclick="setSR('×')">
        <svg viewBox="0 0 100 100" style="width:1em;height:1em;display:inline-block;vertical-align:middle"><line x1="20" y1="20" x2="80" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/><line x1="80" y1="20" x2="20" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
  <div class="form-group" id="modal-todo-area">
    <label class="form-lbl">To-Do List (오늘 할 일)</label>
    <div class="todo-list" id="modal-todo-list" style="margin-top:4px"></div>
    <div class="todo-add-row" style="margin-top:6px">
      <input type="text" id="modal-todo-inp" placeholder="할 일 추가...">
      <button class="btn btn-ghost btn-sm" onclick="addModalTodo()" style="white-space:nowrap">추가</button>
    </div>
  </div>
  <div class="form-group">
    <label class="form-lbl">오늘의 한마디</label>
    <textarea id="inp-memo" rows="2" style="resize:none" placeholder="오늘의 한마디..."></textarea>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" id="btn-save-log" style="flex:1">저장</button>
    <button class="btn btn-danger btn-sm" id="btn-del-log" style="display:none" onclick="deleteLog()">삭제</button>
  </div>
</div>
</div>

<!-- MODAL: Settings -->

<div class="modal">
  <div class="modal-hd">
    <div class="modal-title">⚙️ 설정</div>
    <button class="modal-close" id="btn-close-backup">✕</button>

    <div>
      <label class="form-lbl">Personal Access Token</label>
      <input type="password" id="input-gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>
    <div class="form-row">
      <div style="flex:2">
        <label class="form-lbl">Owner/Repo</label>
        <input type="text" id="input-gh-repo" placeholder="wybhrockstar/2027-Planner">
      </div>
      <div style="flex:1">
        <label class="form-lbl">Branch</label>
        <input type="text" id="input-gh-branch" placeholder="main">
      </div>
    </div>
    <button class="btn btn-ghost" onclick="saveGhSettings()" style="justify-content:center">💾 토큰 저장</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn btn-ghost" onclick="pushToGithub()" style="flex:1;justify-content:center">⬆️ GitHub에 저장</button>
    <button class="btn btn-ghost" onclick="pullFromGithub()" style="flex:1;justify-content:center">⬇️ 불러오기</button>
  </div>
  <div id="gh-status" style="font-size:11px;color:var(--text3);margin-bottom:8px;min-height:18px"></div>

  <!-- 섹션: 백업·복원 -->
  <div style="height:1px;background:var(--border);margin-bottom:8px"></div>
  <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text2);margin-bottom:8px">데이터 백업 · 복원</div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn btn-ghost" onclick="exportData()" style="flex:1;justify-content:center">📤 내보내기</button>
    <button class="btn btn-ghost" onclick="importData()" style="flex:1;justify-content:center">📥 불러오기</button>
  </div>

  <!-- 섹션: 리포트 기준값 -->
  <div style="height:1px;background:var(--border);margin-bottom:16px"></div>
  <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text2);margin-bottom:8px">리포트 경고선 기준값</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
    <div class="form-row">
      <div>
        <label class="form-lbl">목표 공부시간 (H:MM)</label>
        <input type="text" id="rs-study" placeholder="7:00" maxlength="5" style="font-family:'Noto Sans KR',sans-serif">
      </div>
      <div>
        <label class="form-lbl">목표 운동량 (kcal)</label>
        <input type="number" id="rs-kcal" placeholder="200" min="0" max="2000">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div>
        <label class="form-lbl">기상 제한 시각</label>
        <input type="time" id="rs-waketime" placeholder="07:30">
      </div>
      <div>
        <label class="form-lbl">취침 제한 시각</label>
        <input type="time" id="rs-bedtime" placeholder="01:00">
      </div>
      <div>
        <label class="form-lbl">최소 수면시간 (H:MM)</label>
        <input type="text" id="rs-sleep" placeholder="6:00" maxlength="5" style="font-family:'Noto Sans KR',sans-serif">
      </div>
    </div>
    <button class="btn btn-ghost" onclick="saveReportSettings()" style="justify-content:center">💾 저장</button>
  </div>

  <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:11px;color:var(--text4)">2027 IMGO Planner</span>
    <span style="font-size:11px;color:var(--text4);font-family:'JetBrains Mono',monospace">v1.4.0</span>
  </div>
</div>
</div>

<!-- MODAL: Lecture Parser -->
<div id="modal-lec-parser" class="modal-bg">
<div class="modal" style="max-height:92vh">
  <div class="modal-hd">
    <div class="modal-title">📋 강의 파서</div>
    <button class="modal-close" onclick="closeModal('modal-lec-parser')">✕</button>
  </div>
  <div class="form-group">
    <label class="form-lbl">강의 목록 텍스트 붙여넣기</label>
    <textarea id="lc-input" rows="8" style="resize:vertical;font-size:12px;font-family:'JetBrains Mono',monospace" placeholder="강의 목록을 복사해서 붙여넣으세요..."></textarea>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <button class="btn btn-primary" onclick="parseLecturesRule()" style="flex:1">파싱하기</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('lc-input').value=''">초기화</button>
  </div>
  <div id="lc-status" style="font-size:12px;min-height:18px;margin-bottom:8px"></div>

  <div id="lc-preview-wrap" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:11px;color:var(--text3)">파싱 결과 — 과목별로 확인 후 적용하세요</div>
      <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);cursor:pointer">

    <div id="lc-subj-panels" style="max-height:240px;overflow-y:auto;background:var(--bg4);border-radius:var(--rs);padding:10px;font-size:11px;font-family:'JetBrains Mono',monospace;line-height:1.8;white-space:pre-wrap"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-primary" onclick="applyParsedLectures('replace')" style="flex:1">🔄 전체 교체</button>
      <button class="btn btn-ghost" onclick="applyParsedLectures('merge')" style="flex:1">➕ 기존과 병합</button>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:6px">전체 교체: 기존 강의 목록 대체 (완료 기록은 유지). 병합: 새 강의만 추가</div>
  </div>
</div>
</div>

<!-- MODAL: Schedule Cell Edit -->

<header class="hdr">
  <div class="logo">📒 2027 IMGO Planner</div>

<nav class="nav" id="top-nav">

  <div class="sec">

<!-- ③ 리포트 -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script>
// ─── LECTURE_SEED: html에서 제거됨 — data.json이 단일 소스 ──────────────────
// 강의 목록은 data.json에서만 로드됨 (강의 파서로 추가 → data.json에 반영)
const LECTURE_SEED = [];

// ─── SUBJECT CONFIG ──────────────────────────────────────────────────────────
// 확정 순서: 총론·창체, 음악, 음악 심화, 영어, 도덕, 미술, 체육, 사회, 국어, 실과, 통합교과, 수학, 과학, 과학 개념
const SUBJ_ORDER = ['총창','음악','음악 심화','영어','도덕','미술','체육','사회','국어','실과','통교','수학','과학','과학 개념'];
const SUBJ_DISPLAY = {'총창':'총론·창체','통교':'통합교과','음악 심화':'음악 심화','과학 개념':'과학 개념'};
const SUBJ_COLOR = {
  '총창':'#74b9ff',      // 파랑
  '음악':'#ff6b9d',      // 핑크
  '음악 심화':'#e55a8a', // 진한 핑크
  '영어':'#ffb347',      // 주황
  '도덕':'#fd79a8',      // 연핑크
  '미술':'#a29bfe',      // 라벤더
  '체육':'#00cec9',      // 시안
  '사회':'#5ecfb0',      // 민트
  '국어':'#55efc4',      // 연민트
  '실과':'#e17055',      // 테라코타
  '통교':'#fab1d0',      // 연분홍
  '수학':'#6eb5ff',      // 하늘
  '과학':'#ff8fa3',      // 연빨강
  '과학 개념':'#b8a5ff'  // 퍼플

async function gcalRequest(method, path, body) {
  const token = getOAuthToken();
  if (!token) {
    await signInWithGoogle();
    return gcalRequest(method, path, body);
  }
  const res = await fetch(`https://www.googleapis.com/calendar/v3${path}`, {
    method,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401) {
    _oauthToken = null;
    sessionStorage.removeItem('gcal_token');
    await signInWithGoogle();
    return gcalRequest(method, path, body);
  }
  return res;
}

// 날짜 문자열에 n일 더하는 헬퍼
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 일정 생성
async function createGcalEvent(calendarId, { summary, date, startTime, endTime, allDay = true, reminder = null, overflowHour = null }) {
  const isStudy = calendarId === GCAL_STUDY_ID;
  const start = allDay ? { date } : { dateTime: `${date}T${startTime}:00+09:00`, timeZone: 'Asia/Seoul' };
  let end;
  if (allDay) {
    end = { date };
  } else if (overflowHour !== null && overflowHour >= 24) {
    // 27시 개념: 종료가 다음날
    const nextDate = addDays(date, 1);
    const pad = n => String(n).padStart(2,'0');
    const realHour = overflowHour % 24;
    const [, mm] = endTime.split(':');
    end = { dateTime: `${nextDate}T${pad(realHour)}:${mm}:00+09:00`, timeZone: 'Asia/Seoul' };
  } else {
    end = { dateTime: `${date}T${endTime}:00+09:00`, timeZone: 'Asia/Seoul' };
  }
  const reminders = isStudy
    ? { useDefault: false, overrides: [] }
    : reminder !== null
      ? { useDefault: false, overrides: [{ method: 'popup', minutes: reminder }] }
      : { useDefault: true };
  const res = await gcalRequest('POST', `/calendars/${encodeURIComponent(calendarId)}/events`, {
    summary, start, end, reminders
  });
  if (!res.ok) throw new Error(await res.text());
  clearIcalCache();
  return await res.json();
}

// 일정 n일 이동
async function shiftGcalEvents(eventList, days) {
  const promises = eventList.map(async ({ calendarId, event }) => {
    const isAllDay = !!event.start.date;
    let newStart, newEnd;
    if (isAllDay) {
      const s = new Date(event.start.date + 'T00:00:00'); s.setDate(s.getDate() + days);
      const e = new Date(event.end.date   + 'T00:00:00'); e.setDate(e.getDate() + days);
      newStart = { date: `${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,'0')}-${String(s.getDate()).padStart(2,'0')}` };
      newEnd   = { date: `${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}-${String(e.getDate()).padStart(2,'0')}` };
    } else {
      const s = new Date(event.start.dateTime); s.setDate(s.getDate() + days);
      const e = new Date(event.end.dateTime);   e.setDate(e.getDate() + days);
      newStart = { dateTime: s.toISOString(), timeZone: 'Asia/Seoul' };
      newEnd   = { dateTime: e.toISOString(), timeZone: 'Asia/Seoul' };
    }
    const res = await gcalRequest('PATCH', `/calendars/${encodeURIComponent(calendarId)}/events/${event.id}`, {
      start: newStart, end: newEnd
    });
    if (!res.ok) throw new Error(await res.text());
  });
  await Promise.all(promises);
  clearIcalCache();
}

// ─── Google Calendar API ───────────────────────────────────────────────────
async function fetchGcalEvents(calendarId) {
  try {
    const id = encodeURIComponent(calendarId);
    const year = new Date().getFullYear();
    const params = new URLSearchParams({
      key: GCAL_API_KEY,
      timeMin: `${year}-01-01T00:00:00+09:00`,
      timeMax: `${year}-12-31T23:59:59+09:00`,
      maxResults: 2500,
      singleEvents: true,
      orderBy: 'startTime',
      _t: Date.now()
    });
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${id}/events?${params}`, {
      cache: 'no-store'
    });
    if (!res.ok) { console.warn(`GCal fetch failed (${calendarId}):`, res.status); return []; }
    const data = await res.json();
    return (data.items || []).map(item => {
      // 종일 이벤트: item.start.date = 'YYYY-MM-DD' (로컬 날짜 그대로)
      // 시간 이벤트: item.start.dateTime = 'YYYY-MM-DDTHH:MM:SS+09:00' → 로컬 날짜 추출
      const toLocalDate = (d) => {
        if (!d) return null;
        if (d.length === 10) return d; // 이미 YYYY-MM-DD
        const dt = new Date(d); // dateTime은 오프셋 포함이라 new Date()가 올바르게 파싱
        return dateStr(dt);
      };
      const start = toLocalDate(item.start.date || item.start.dateTime);
      let end = toLocalDate(item.end.date || item.end.dateTime);
      // 종일 이벤트 DTEND는 다음날 → 하루 빼기
      if (item.start.date && end && end > start) {
        const d = new Date(end + 'T00:00:00');
        d.setDate(d.getDate() - 1);
        end = dateStr(d);
      }
      return { date: start, endDate: end || start, summary: item.summary || '(제목 없음)', id: item.id, _raw: item };
    });
  } catch(e) { console.warn('GCal fetch error:', e); return []; }
}

function today() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dDay() {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((EXAM_DATE - now) / 86400000);
}
function subjectName(s) { return SUBJ_DISPLAY[s] || s; }
function parseStudyMin(str) {
  if (!str) return 0;
  const m = String(str).match(/^(\d+):(\d+)$/);
  if (m) return parseInt(m[1])*60 + parseInt(m[2]);
  const n = parseInt(str);
  return isNaN(n) ? 0 : n;
}
function fmtMin(m) {
  if (!m) return '0h';
  const h = Math.floor(m/60), mn = m%60;
  return mn > 0 ? `${h}h ${mn}m` : `${h}h`;
}
function sleepHours(wake, bed) {
  if (!wake || !bed) return null;
  const [wh,wm] = wake.split(':').map(Number);
  const [bh,bm] = bed.split(':').map(Number);
  let bedMin = bh*60+bm, wakeMin = wh*60+wm;
  if (bedMin > wakeMin) bedMin -= 1440;
  let diff = wakeMin + 1440 - bedMin;
  if (diff > 1440) diff -= 1440;
  return { h: Math.floor(diff/60), m: diff%60, total: diff };
}
function fmtSleep(sh) {
  if (!sh) return '';
  return sh.m > 0 ? `${sh.h}h ${sh.m}m` : `${sh.h}h`;
}
function fmtMinLong(m) {
  if (!m) return '0h';
  const h = Math.floor(m/60), mn = m%60;
  return mn > 0 ? `${h}h ${mn}m` : `${h}h`;
}
// 오늘 stat 카드 공부시간 전용 — narrow no-break space(U+202F)
function fmtMinNarrow(m) {
  if (!m) return '0h';
  const h = Math.floor(m/60), mn = m%60;
  return mn > 0 ? `${h}h ${mn}m` : `${h}h`;
}

// Is today a study day? (1~2텀: 월수금일, 3~4텀: 매일)
function getTermIdForDate(ds) {
  const s = ds || today();
  for (const t of TERMS) { if (s >= t.start && s <= t.end) return t.id; }
  if (s < TERMS[0].start) return 1;
  return 4;
}

  const d = dateStr ? new Date(dateStr+'T00:00:00') : new Date();
  const termId = getTermIdForDate(dateStr || today());
  if (termId >= 3) return true; // 3~4텀: 매일
  return [0,1,3,5].includes(d.getDay()); // 1~2텀: 일월수금

  document.getElementById('rs-bedtime').value = rs.bedtimeLimit||'01:00';

  document.getElementById('input-gh-repo').value = gh.repo || GH_REPO_DEFAULT;
  document.getElementById('input-gh-branch').value = gh.branch || GH_BRANCH_DEFAULT;
  document.getElementById('gh-status').textContent = '';
  openModal('modal-backup');
}

function saveReportSettings() {
  // H:MM 형식 파싱 → 분
  function parseHMM(val, fallback) {
    const v = (val||'').trim();
    if (v.includes(':')) {
      const [h, m] = v.split(':').map(Number);
      const total = (isNaN(h)?0:h)*60 + (isNaN(m)?0:m);
      return total > 0 ? total : fallback;
    }
    const n = parseFloat(v);
    return n > 0 ? n : fallback;
  }
  const studyMin = parseHMM(document.getElementById('rs-study').value, 420);
  const sleepMin = parseHMM(document.getElementById('rs-sleep').value, 360);
  state.reportSettings = {
    studyGoalHour: studyMin / 60,   // 호환성 유지
    studyGoalMin: studyMin,
    sleepMinHour: sleepMin / 60,    // 호환성 유지
    sleepMinMin: sleepMin,
    kcalGoal: parseFloat(document.getElementById('rs-kcal').value) || 200,
    bedtimeLimit: document.getElementById('rs-bedtime').value||'01:00',
    wakeTimeLimit: document.getElementById('rs-waketime').value||'07:30'
  };
  saveState();
  toast('✓ 리포트 기준값 저장됨');
}

let icalCache = { study: [], personal: [], loaded: false };
let _icalLastFetch = 0;
let _icalFetchPromise = null;
async function loadIcalData({ force = false } = {}) {
  const now = Date.now();
  if (!force && icalCache.loaded && (now - _icalLastFetch) < GCAL_REFRESH_MS) return icalCache;
  if (_icalFetchPromise) return _icalFetchPromise;
  _icalFetchPromise = Promise.all([
    fetchGcalEvents(GCAL_STUDY_ID),
    fetchGcalEvents(GCAL_PERSONAL_ID)
  ]).then(([study, personal]) => {
    icalCache = { study, personal, loaded: true };
    _icalLastFetch = Date.now();
    return icalCache;
  }).finally(() => {
    _icalFetchPromise = null;
  });
  return _icalFetchPromise;
}
function clearIcalCache() { icalCache = { study: [], personal: [], loaded: false }; _icalLastFetch = 0; }

function isIcalViewVisible() {
  return currentPage === 'today' || (currentPage === 'planner' && plannerTab === 'calendar');
}

function renderVisibleIcalView() {
  if (currentPage === 'today') renderToday();
  else if (currentPage === 'planner' && plannerTab === 'calendar') renderCalendar();

async function refreshIcalDataAndView({ force = true, silent = true } = {}) {
  if (force) clearIcalCache();
  if (!isIcalViewVisible()) return;
  if (!silent) toast('구글 캘린더 새로고침 중...');
  await loadIcalData({ force });
  renderVisibleIcalView();
}

function setupIcalAutoRefresh() {
  window.addEventListener('focus', () => refreshIcalDataAndView({ force: true }));
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refreshIcalDataAndView({ force: true });
  });
  setInterval(() => {
    if (!document.hidden) refreshIcalDataAndView({ force: true });
  }, GCAL_REFRESH_MS);
}

function saveLog() {
  const td = logModalDate || today();
  const wake = document.getElementById('inp-wake').value;
  const slp = document.getElementById('inp-sleep').value;
  const studyMin = parseStudyMin(document.getElementById('inp-study').value);
  const kcal = parseInt(document.getElementById('inp-kcal').value)||0;
  const memo = document.getElementById('inp-memo').value.trim();
  const studyResult = isStudyDay(td) ? (currentSR || null) : null;
  const studyChecklist = studyCheckItems.length ? [...studyCheckItems] : undefined;
  const entry = { date:td, wakeTime:wake, sleepTime:slp, studyMin, kcal, memo, studyResult };
  if (studyChecklist) entry.studyChecklist = studyChecklist;
  const existing = state.dailyLogs.findIndex(l=>l.date===td);
  if (existing>=0) state.dailyLogs[existing] = entry;
  else state.dailyLogs.push(entry);
  saveState();
  closeModal('modal-log');
  if (td === today()) renderToday();
  else renderPage(currentPage);
  toast('✓ 기록 저장됨');
}

  const td = logModalDate || today();
  state.dailyLogs = state.dailyLogs.filter(l=>l.date!==td);
  saveState();
  closeModal('modal-log');
  if (td === today()) renderToday();
  else renderPage(currentPage);
  toast('기록 삭제됨');
}

    btn.addEventListener('click', () => {

      state.dailyTodos[dateKey].splice(Number(btn.dataset.idx), 1);
      saveState();
      renderModalTodos();
      if (dateKey === today()) renderTodayTodos();
    });
  });
}

function addModalTodo() {
  const dateKey = logModalDate || today();
  const inp = document.getElementById('modal-todo-inp');
  const text = inp.value.trim();
  if (!text) return;
  if (!state.dailyTodos[dateKey]) state.dailyTodos[dateKey] = [];
  state.dailyTodos[dateKey].push({ id: Date.now().toString(36), text, done: false });
  inp.value = '';
  saveState();
  renderModalTodos();
  if (dateKey === today()) renderTodayTodos();
}


function renderTodayTodos() {
  const td = today();
  const todos = state.dailyTodos[td] || [];
  const list = document.getElementById('todo-list-items');
  if (!list) return;
  list.innerHTML = todos.map((item, i) => `
    <div class="todo-item ${item.done?'done-item':''}" data-idx="${i}">
      <input type="checkbox" ${item.done?'checked':''} data-idx="${i}" class="todo-item-cb" style="width:14px;height:14px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)">
      <div class="todo-item-text ${item.done?'done-text':''}" data-idx="${i}">${item.text}</div>
      <button class="todo-del" data-idx="${i}">✕</button>
    </div>
  `).join('');

      state.dailyTodos[td].splice(idx, 1);

      renderTodayTodos();

function addTodo() {

  if (!state.dailyTodos[td]) state.dailyTodos[td] = [];

// Enter key for todo input
document.getElementById('todo-inp').addEventListener('keydown', e => {

});


let progressTerm = getCurrentTerm();

function renderProgress() {
  // render subtabs
  const tabs = document.getElementById('term-subtabs');
  tabs.innerHTML = TERMS.map(t =>
    `<button class="term-stab ${t.id===progressTerm?'on':''}" data-tid="${t.id}">${t.name}</button>`
  ).join('');
  tabs.querySelectorAll('.term-stab').forEach(btn => {
    btn.addEventListener('click', () => { progressTerm = Number(btn.dataset.tid); renderProgress(); });
  });
  renderProgressContent();
}

function renderProgressContent() {
  const t = TERMS[progressTerm-1];
  const now = today();
  const started = now >= t.start;
  const ended = now > t.end;
  let elapsed = 0;
  if (started) {
    const cur = new Date(Math.min(new Date(), new Date(t.end)));
    elapsed = Math.round((cur - new Date(t.start)) / 86400000);
  }
  const dayPct = t.days ? Math.min(100, Math.round(elapsed/t.days*100)) : 0;
  const status = !started?'예정':ended?'완료':'진행중';
  const statusColor = !started?'var(--text3)':ended?'var(--teal)':'var(--accent)';

  // term period card (이미지 스타일)
  let html = `
  <div class="term-prog-block" style="margin-bottom:16px">
    <div class="term-prog-hd">
      <div>
        <div class="term-prog-name">${t.name} <span style="font-size:11px;color:${statusColor};font-weight:600">${status}</span></div>
        <div class="term-prog-dates">${t.start} ~ ${t.end}</div>
      </div>
      <div style="text-align:right">
        <div class="term-prog-pct" style="color:${statusColor}">${dayPct}%</div>
        <div class="term-prog-days">${elapsed}/${t.days}일</div>
      </div>
    </div>
    <div class="pbar" style="height:8px"><div class="pbar-fill" style="width:${dayPct}%;background:${statusColor}"></div></div>
  </div>`;

  // 달성률 프로그레스바 4종
  const termLogs = state.dailyLogs.filter(l => l.date >= t.start && l.date <= t.end);
  const termDoneLecs = state.lectures.filter(l => l.done && l.doneDate >= t.start && l.doneDate <= t.end).length;
  const totalLecs = state.lectures.length;
  const lecPct = totalLecs ? Math.min(100, Math.round(termDoneLecs/totalLecs*100)) : 0;

  // study days: Mon/Wed/Fri/Sun within term
  const studyDayLogs = termLogs.filter(l => isStudyDay(l.date));
  const studyO = studyDayLogs.filter(l => l.studyResult==='O').length;
  // count all study days in FULL TERM (분모: 텀 전체 스터디 총횟수)
  let totalStudyDays = 0;
  const tStart = new Date(t.start), tEnd = new Date(t.end);
  for (let d = new Date(tStart); d <= tEnd; d.setDate(d.getDate()+1)) {
    if (isStudyDay(dateStr(d))) totalStudyDays++;
  }
  const studyPct = totalStudyDays ? Math.min(100, Math.round(studyO/totalStudyDays*100)) : 0;

  const totalStudyMin = termLogs.reduce((s,l)=>s+l.studyMin,0);
  const rs = state.reportSettings;
  const studyGoalMinPerDay = rs.studyGoalMin ? rs.studyGoalMin : (rs.studyGoalHour||7)*60;
  const goalMin = t.days * studyGoalMinPerDay;
  const studyHourPct = goalMin ? Math.min(100, Math.round(totalStudyMin/goalMin*100)) : 0;

  const totalKcal = termLogs.reduce((s,l)=>s+(l.kcal||0),0);
  const goalKcal = t.days * (rs.kcalGoal || 200);
  const exPct = goalKcal ? Math.min(100, Math.round(totalKcal/goalKcal*100)) : 0;

  html += `<div class="card" style="margin-bottom:16px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text);margin-bottom:12px">텀 달성률</div>
    ${inlineBar('공부', studyHourPct, fmtMin(totalStudyMin)+`/${fmtMin(goalMin)}`, 'var(--accent)')}
    ${inlineBar('운동', exPct, `${totalKcal}/${goalKcal}kcal`, 'var(--orange)')}
    ${inlineBar('인강', lecPct, `${termDoneLecs}/${totalLecs}강`, 'var(--blue)')}
    ${inlineBar('스터디', studyPct, `${studyO}/${totalStudyDays}회`, 'var(--teal)')}
  </div>`;

  // 잔디
  html += renderGrass(t);

  document.getElementById('progress-term-content').innerHTML = html;
  bindGrassClicks();
}

function inlineBar(name, pct, sub, color) {
  return `<div class="pbar-wrap" style="margin-bottom:10px">
    <div class="pbar-hd">
      <div class="pbar-name">${name}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${color}">${pct}% <span style="color:var(--text3);font-size:10px">${sub}</span></div>
    </div>
    <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function renderGrass(term) {
  // 날짜 목록 생성
  const dates = [];
  const s = new Date(term.start), e = new Date(term.end);
  for (let d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
    dates.push(dateStr(d));
  }
  const td = today();
  const logMap = {};
  state.dailyLogs.forEach(l => { logMap[l.date] = l; });
  const lecMap = {};
  state.lectures.filter(l=>l.done&&l.doneDate).forEach(l => {
    lecMap[l.doneDate] = (lecMap[l.doneDate]||0)+1;
  });

  // 7일씩 주차 분리
  const weeks = [];
  let week = [];
  dates.forEach((d, i) => {
    week.push(d);
    if (week.length === 7 || i === dates.length - 1) {
      weeks.push(week);
      week = [];
    }
  });

  // 셀 데이터 계산 함수
  function getCellData(d) {
    const log = logMap[d];
    const lDone = lecMap[d] || 0;
    const isFuture = d > td;
    const isToday = d === td;
    const studyDay = isStudyDay(d);
    if (isFuture) return { isFuture, isToday, log, lDone, studyDay };
    let srVal = null, studyVal = null, kcalVal = null;
    if (log) {
      srVal = studyDay ? (log.studyResult || '×') : null;
      studyVal = studyGrade(log.studyMin||0);
      kcalVal = kcalGrade(log.kcal||0);
    }
    return { isFuture, isToday, log, lDone, srVal, studyVal, kcalVal, studyDay };
  }

  function cellClass(grade) {
    if (grade === 'O') return 'cell-o';
    if (grade === '△') return 'cell-d';
    if (grade === '×') return 'cell-x';
    return 'cell-none';
  }

  // 행 4종 정의
  const ROWS = [
    { label: '공부',
      render: (d, cd) => {
        if (cd.isFuture) return { cls:'future', txt:'', style:'' };
        if (!cd.log) return { cls:'cell-none', txt:'', style:'' };
        const v = cd.log.studyMin||0;
        const txt = v ? `${(v/60).toFixed(1)}h` : '×';
        const rs = state.reportSettings;
        const goalMin = rs.studyGoalMin ? rs.studyGoalMin : (rs.studyGoalHour || 7) * 60;
        if (v >= goalMin) return { cls:'cell-o', txt, style:'background:rgba(94,207,176,.25);color:#5ecfb0' };
        if (v >= 60) return { cls:'cell-d', txt, style:'background:rgba(255,159,67,.2);color:#ff9f43' };
        return { cls:'cell-x', txt, style:'background:rgba(255,90,90,.18);color:#ff5a5a' };
      }
    },
    { label: '운동',
      render: (d, cd) => {
        if (cd.isFuture) return { cls:'future', txt:'', style:'' };
        if (!cd.log) return { cls:'cell-none', txt:'', style:'' };
        const v = cd.log.kcal||0;
        const rs = state.reportSettings;
        const goalKcal = rs.kcalGoal || 200;
        if (v >= goalKcal) return { cls:'cell-o', txt:`${v}`, style:'background:rgba(94,207,176,.25);color:#5ecfb0' };
        if (v > 0) return { cls:'cell-d', txt:`${v}`, style:'background:rgba(255,159,67,.2);color:#ff9f43' };
        return { cls:'cell-x', txt:'×', style:'background:rgba(255,90,90,.18);color:#ff5a5a' };
      }
    },
    { label: '인강',
      render: (d, cd) => {
        if (cd.isFuture) return { cls:'future', txt:'', style:'' };
        if (!cd.log && !cd.lDone) return { cls:'cell-none', txt:'', style:'' };
        const txt = cd.lDone > 0 ? `${cd.lDone}` : '×';
        const cls = cd.lDone > 0 ? 'cell-o' : 'cell-x';
        return { cls, txt, style:'' };
      }
    },
    { label: '스터디',
      render: (d, cd) => {
        if (!cd.studyDay) return { cls:'cell-skip', txt:'-', style:'' };
        if (cd.isFuture) return { cls:'future', txt:'', style:'' };
        if (!cd.log) return { cls:'cell-none', txt:'', style:'' };
        const sr = cd.srVal;
        const cls = sr==='O'?'cell-o':sr==='△'?'cell-d':sr==='×'?'cell-x':'cell-none';
        const txt = sr ? (sr==='O'?'○':sr==='△'?'△':'×') : '';
        const style = sr==='△' ? 'background:rgba(255,159,67,.2);color:#ff9f43' : '';
        return { cls, txt, style };
      }
    }
  ];

  // PC(≥1200px) 3주/그룹, 모바일 2주/그룹으로 슬라이싱 후 세로로 반복
  // 날짜를 요일 기준으로 정렬: 텀 시작 전 월요일부터 시작, 텀 끝 다음 일요일까지
  function buildAlignedGrid(numWeeks) {
    // 텀 전체를 요일 정렬된 그리드로 펼침
    // 첫날의 요일(월=0, 일=6)을 구해 그 전 월요일부터 시작
    const firstDate = new Date(term.start + 'T00:00:00');
    const firstDow = (firstDate.getDay() + 6) % 7; // 월=0, 일=6
    const gridStart = new Date(firstDate);
    gridStart.setDate(gridStart.getDate() - firstDow);

    const lastDate = new Date(term.end + 'T00:00:00');
    const lastDow = (lastDate.getDay() + 6) % 7;
    const gridEnd = new Date(lastDate);
    gridEnd.setDate(gridEnd.getDate() + (6 - lastDow));

    // 전체 그리드 날짜 목록 (null = 텀 외부 빈칸)
    const allCells = [];
    for (let d = new Date(gridStart); d <= gridEnd; d.setDate(d.getDate()+1)) {
      const ds = dateStr(d);
      allCells.push(ds >= term.start && ds <= term.end ? ds : null);
    }

    // numWeeks개씩 묶어 그룹 배열 생성 (각 그룹 = numWeeks*7 cells)
    const totalCols = numWeeks * 7;
    const groups = [];
    for (let i = 0; i < allCells.length; i += totalCols) {
      groups.push(allCells.slice(i, i + totalCols));
    }

    const DOW_LABELS = ['월','화','수','목','금','토','일'];

    return groups.map(cells => {
      // cells.length가 totalCols 미만이면 null로 패딩
      while (cells.length < totalCols) cells.push(null);

      // 헤더: 날짜행 (주 구분선 포함)
      let hdr = `<tr class="date-row"><th class="row-label" style="min-width:4.8em"></th>`;
      for (let col = 0; col < totalCols; col++) {
        const d = cells[col];
        const sep = (col > 0 && col % 7 === 0) ? ' week-sep' : '';
        if (!d) {
          // 빈칸이지만 요일 헤더는 표시
          const dowLabel = DOW_LABELS[col % 7];
          const dowIdx = col % 7;
          const color = dowIdx===6?'var(--red)':dowIdx===5?'var(--blue)':'';
          hdr += `<th class="${sep}" style="${color?`color:${color}`:''}">${dowLabel}</th>`;
        } else {
          const dt = new Date(d + 'T00:00:00');
          const label = `${dt.getMonth()+1}/${dt.getDate()}`;
          const dow = (dt.getDay() + 6) % 7;
          const color = dow===6?'var(--red)':dow===5?'var(--blue)':'';
          hdr += `<th class="${sep}" style="${color?`color:${color}`:''}">${label}</th>`;
        }
      }
      hdr += `</tr>`;

      // 데이터 행
      let rows = '';
      ROWS.forEach(row => {
        rows += `<tr><th class="row-label" style="min-width:4.8em">${row.label}</th>`;
        for (let col = 0; col < totalCols; col++) {
          const d = cells[col];
          const sep = (col > 0 && col % 7 === 0) ? ' week-sep' : '';
          if (!d) {
            rows += `<td class="cell-blank${sep}" style="background:transparent!important;border-color:var(--border)!important;cursor:default!important;pointer-events:none"></td>`;
          } else {
            const cd = getCellData(d);
            const { cls, txt, style } = row.render(d, cd);
            const todayCls = cd.isToday ? ' today-col' : '';
            const clickable = !cd.isFuture && cls !== 'cell-skip';
            const styleAttr = style ? ` style="${style}"` : '';
            rows += `<td class="${cls}${todayCls}${sep}" ${clickable?`data-date="${d}"`:''}${styleAttr}>${txt}</td>`;
          }
        }
        rows += `</tr>`;
      });

      return `<div class="grass-block"><table class="grass-subtable">${hdr}${rows}</table></div>`;
    }).join('');
  }

  const pc3Html = buildAlignedGrid(3); // PC: 21일(3주)
  const mo2Html = buildAlignedGrid(2); // 모바일: 14일(2주)

  return `<div class="card" style="padding:12px 10px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text);margin-bottom:10px">일일 체크리스트</div>
    <div class="grass-pc" id="grass-pc-${term.id}">${pc3Html}</div>
    <div class="grass-mo" id="grass-mo-${term.id}" style="display:none">${mo2Html}</div>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:10px">
      <span class="cell-o" style="padding:1px 6px;border-radius:4px">○ 달성</span>
      <span class="cell-d" style="padding:1px 6px;border-radius:4px">△ 부분</span>
      <span class="cell-x" style="padding:1px 6px;border-radius:4px">× 미달</span>
      <span style="color:var(--text4);font-size:10px">- 해당없음</span>
    </div>
  </div>`;
}

// 표 클릭 이벤트 바인딩
function bindGrassClicks() {

});

// ─── LECTURES ────────────────────────────────────────────────────────────────
let lecSubjFilter = SUBJ_ORDER[0];

function renderLectures() {
  // ── 전체 진행률 — 과목별 인라인 바와 동일한 형태 ──
  const totalAll = state.lectures.length;
  const doneAll = state.lectures.filter(l=>l.done).length;
  const pctAll = totalAll ? Math.round(doneAll/totalAll*100) : 0;
  const totalBar = document.getElementById('lec-total-progress');
  if (totalBar) {
    totalBar.innerHTML = `<div class="subj-inline-grid">
      <div class="subj-inline-row">
        <div class="subj-inline-name" style="color:var(--accent)">전체 강의</div>
        <div class="subj-inline-bar"><div class="subj-inline-fill" style="width:${pctAll}%;background:var(--accent)"></div></div>
        <div class="subj-inline-info">${pctAll}% <span style="color:var(--text4)">(${doneAll}/${totalAll}강)</span></div>
      </div>
    </div>`;
  }

  // ── 과목별 진행률 그리드 ──
  const grid = document.getElementById('subj-inline-progress');
  grid.innerHTML = `<div class="subj-inline-grid">${SUBJ_ORDER.map(s => {
    const sLecs = state.lectures.filter(l=>l.subject===s);
    if (!sLecs.length) return '';
    const sDone = sLecs.filter(l=>l.done).length;
    const sPct = Math.round(sDone/sLecs.length*100);
    const color = SUBJ_COLOR[s]||'var(--blue)';
    return `<div class="subj-inline-row">
      <div class="subj-inline-name" style="color:${color}">${subjectName(s)}</div>
      <div class="subj-inline-bar"><div class="subj-inline-fill" style="width:${sPct}%;background:${color}"></div></div>
      <div class="subj-inline-info">${sPct}% <span style="color:var(--text4)">(${sDone}/${sLecs.length}강)</span></div>
    </div>`;
  }).join('')}</div>`;

  // ── 강의 목록 과목 탭 ──
  const subjects = SUBJ_ORDER.filter(s=>state.lectures.some(l=>l.subject===s));
  if (!lecSubjFilter || !subjects.includes(lecSubjFilter)) lecSubjFilter = subjects[0];
  const tabs = document.getElementById('lec-subj-tabs');
  tabs.innerHTML = subjects.map(s => {
    const sLecs = state.lectures.filter(l=>l.subject===s);
    const sDone = sLecs.filter(l=>l.done).length;
    return `<button class="stab ${s===lecSubjFilter?'on':''}" data-subj="${s}">${subjectName(s)} <span style="font-family:'JetBrains Mono',monospace;font-size:10px">(${sDone}/${sLecs.length}강)</span></button>`;
  }).join('');
  tabs.querySelectorAll('.stab').forEach(btn => {
    btn.addEventListener('click', () => { lecSubjFilter = btn.dataset.subj; renderLecList(); renderLecTabs(); });
  });
  renderLecList();
}

function renderLecTabs() {
  document.getElementById('lec-subj-tabs').querySelectorAll('.stab').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.subj === lecSubjFilter);
  });
}

// ─── REPORT ──────────────────────────────────────────────────────────────────
let reportMode = 'week'; // 'week' | 'month'
let reportOffset = 0;
let chartsRef = {};

function setReportMode(mode) {
  reportMode = mode;
  reportOffset = 0;
  document.getElementById('rtog-week').classList.toggle('on', mode==='week');
  document.getElementById('rtog-month').classList.toggle('on', mode==='month');
  renderReport();
}

document.getElementById('btn-report-prev').addEventListener('click', () => { reportOffset--; renderReport(); });
document.getElementById('btn-report-next').addEventListener('click', () => { reportOffset++; renderReport(); });

function getReportLogs() {
  const now = new Date(); now.setHours(0,0,0,0);
  let start, end;
  if (reportMode === 'week') {
    const dow = now.getDay();
    const mon = new Date(now); mon.setDate(now.getDate() - ((dow+6)%7) + reportOffset*7);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    start = dateStr(mon);
    end = dateStr(sun);
    const s = mon.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    const e = sun.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    document.getElementById('report-period-lbl').textContent = `${s} ~ ${e}`;
    // build all 7 dates
    const dates = [];
    for (let d=new Date(mon); d<=sun; d.setDate(d.getDate()+1)) dates.push(dateStr(d));
    return {dates, logs: state.dailyLogs.filter(l=>l.date>=start&&l.date<=end)};
  } else {
    const base = new Date(now.getFullYear(), now.getMonth()+reportOffset, 1);
    const yr = base.getFullYear(), mo = base.getMonth();
    const daysInMonth = new Date(yr,mo+1,0).getDate();
    start = `${yr}-${String(mo+1).padStart(2,'0')}-01`;
    end = `${yr}-${String(mo+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
    document.getElementById('report-period-lbl').textContent = `${yr}년 ${mo+1}월`;
    const dates = [];
    for (let i=1; i<=daysInMonth; i++) dates.push(`${yr}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`);
    return {dates, logs: state.dailyLogs.filter(l=>l.date>=start&&l.date<=end)};
  }
}

function renderReport() {
  const {dates, logs} = getReportLogs();
  const logMap = {};
  logs.forEach(l => { logMap[l.date] = l; });
  const rs = state.reportSettings;

  const labels = dates.map(d => d.slice(5));
  const studyData = dates.map(d => logMap[d] ? +(logMap[d].studyMin/60).toFixed(1) : 0);
  const kcalData = dates.map(d => logMap[d] ? (logMap[d].kcal||0) : 0);

  // Study chart - color by goal
  const studyGoalH = (rs.studyGoalMin ? rs.studyGoalMin/60 : rs.studyGoalHour) || 7;
  const kcalGoal = rs.kcalGoal || 200;
  buildBarChart('chart-study', labels, studyData, studyGoalH, 'var(--accent)', 'var(--red)', `${studyGoalH}h 목표`);
  buildBarChart('chart-kcal', labels, kcalData, kcalGoal, 'var(--orange)', 'var(--text3)', `${kcalGoal}kcal`);
  buildSleepBubble('chart-sleep-bubble', dates, logMap, rs);
  buildSleepLine('chart-sleep-line', dates, logMap, rs);
}

function buildBarChart(id, labels, data, threshold, goodColor, badColor, thresholdLabel) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartsRef[id]) { chartsRef[id].destroy(); }
  const isDark = !document.body.classList.contains('light');
  const gridColor = isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const textColor = isDark?'#cccccc':'#555555';
  const xLabelColor = isDark?'#eeeeee':'#222222';

  // 1-2/1-3: 3단계 색상 분기
  // study: threshold=목표시간, badColor used for 1h boundary
  // kcal: threshold=목표kcal, 0 boundary for red
  const isStudy = id === 'chart-study';
  const isKcal  = id === 'chart-kcal';

  function barColor(v, alpha) {
    if (isStudy) {
      if (v >= threshold) return '#5ecfb0' + (alpha?'88':'');
      if (v >= 1)         return '#ff9f43' + (alpha?'88':'');
      return                     '#ff5a5a' + (alpha?'88':'');
    } else if (isKcal) {
      if (v >= threshold) return '#5ecfb0' + (alpha?'88':'');
      if (v > 0)          return '#ff9f43' + (alpha?'88':'');
      return                     '#ff5a5a' + (alpha?'88':'');
    } else {
      // fallback
      const resolved = (c) => ({'var(--accent)':'#c8f060','var(--blue)':'#6eb5ff','var(--orange)':'#ff9f43','var(--teal)':'#5ecfb0','var(--red)':'#ff5a5a','var(--text3)':'#777'}[c]||c);
      return v >= threshold ? resolved(goodColor)+(alpha?'88':'') : resolved(badColor)+(alpha?'88':'');
    }
  }

  const bgs     = data.map(v => barColor(v, true));
  const borders = data.map(v => barColor(v, false));

  chartsRef[id] = new Chart(canvas, {
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:bgs,borderColor:borders,borderWidth:0,borderRadius:4}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          titleFont:{weight:'bold',size:12},
          bodyFont:{size:12},
          usePointStyle:true,
          callbacks:{
            title:(items) => items[0].label,
            label:(ctx) => {
              const v = ctx.parsed.y;
              if (isStudy) {
                const h = Math.floor(v);
                const m = Math.round((v - h) * 60);
                return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
              }
              return `${v} kcal`;
            },
            labelColor:(ctx) => {
              const v = ctx.parsed.y;
              const col = barColor(v, false);
              return {borderColor:col,backgroundColor:col};
            }
          }
        },
        annotation:{annotations:{
          goalLine:{type:'line',yMin:threshold,yMax:threshold,
            borderColor:'rgba(200,200,200,0.55)',borderWidth:1.5,borderDash:[4,4]}
        }}
      },
      scales:{
        x:{grid:{color:gridColor},ticks:{color:xLabelColor,font:{size:10}}},
        y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}},beginAtZero:true}
      }
    }
  });
}

function buildSleepBubble(id, dates, logMap, rs) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartsRef[id]) { chartsRef[id].destroy(); }
  const isDark = !document.body.classList.contains('light');
  const gridColor = isDark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)';
  const textColor = isDark?'#cccccc':'#555555';
  const xLabelColor = isDark?'#eeeeee':'#222222';

  // 시간 문자열 → 숫자(시간 단위). 자정 이후면 24+ 로 반환
  const timeToNum = (t) => { if (!t) return null; const [h,m] = t.split(':').map(Number); return h+m/60; };
  // 취침 경고선: 자정 이후면 24+ 로 처리
  const rawBedLimit = timeToNum(rs.bedtimeLimit)||1;
  const bedLimit = rawBedLimit < 12 ? rawBedLimit + 24 : rawBedLimit; // ex. 01:00 → 25
  const wakeLimit = timeToNum(rs.wakeTimeLimit)||7.5;

  // y축 범위: 기상은 0~12, 취침은 18~30 정도 커버
  const Y_MIN = 0, Y_MAX = 30;

  const wakePoints = [], bedPoints = [];
  dates.forEach((d,i) => {
    const log = logMap[d];
    if (!log) return;
    if (log.wakeTime) {
      const v = timeToNum(log.wakeTime);
      const over = v > wakeLimit;
      wakePoints.push({x:i, y:v, dateLabel:d.slice(5), timeStr:log.wakeTime, color: over?'#ff5a5a':'#5ecfb0'});
    }
    if (log.sleepTime) {
      let v = timeToNum(log.sleepTime);
      // 자정 이후(0~11시)면 24+ 로 올림 → 기상보다 항상 위에 표시
      if (v < 12) v += 24;
      const over = v > bedLimit;
      bedPoints.push({x:i, y:v, dateLabel:d.slice(5), timeStr:log.sleepTime, color: over?'#ff5a5a':'#5ecfb0'});
    }
  });

  // y축 레이블: 0~11은 그대로, 12~23도 그대로, 24~29는 실제시간(0~5)으로 표시
  function yTickLabel(v) {
    const realH = v >= 24 ? v - 24 : v;
    return `${String(Math.floor(realH)).padStart(2,'0')}:00`;
  }

  chartsRef[id] = new Chart(canvas, {
    type:'scatter',
    data:{datasets:[
      {label:'기상',data:wakePoints.map(p=>({x:p.x,y:p.y})),
       backgroundColor:wakePoints.map(p=>p.color+'bb'),pointRadius:6,pointStyle:'circle'},
      {label:'취침',data:bedPoints.map(p=>({x:p.x,y:p.y})),
       backgroundColor:bedPoints.map(p=>p.color+'bb'),pointRadius:6,pointStyle:'circle'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          titleFont:{weight:'bold',size:12},
          bodyFont:{size:12},
          usePointStyle:true,
          callbacks:{
            title:(items) => {
              const ctx = items[0];
              const dsIdx = ctx.datasetIndex;
              const ptIdx = ctx.dataIndex;
              const pts = dsIdx===0 ? wakePoints : bedPoints;
              const pt = pts[ptIdx];
              return pt ? pt.dateLabel : '';
            },
            label:(ctx) => {
              const dsIdx = ctx.datasetIndex;
              const ptIdx = ctx.dataIndex;
              const pts = dsIdx===0 ? wakePoints : bedPoints;
              const pt = pts[ptIdx];
              if (!pt) return '';
              const label = dsIdx===0 ? '기상' : '취침';
              return `${pt.timeStr} ${label}`;
            },
            labelColor:(ctx) => {
              const dsIdx = ctx.datasetIndex;
              const ptIdx = ctx.dataIndex;
              const pts = dsIdx===0 ? wakePoints : bedPoints;
              const pt = pts[ptIdx];
              const col = pt ? pt.color : '#5ecfb0';
              return {borderColor:col,backgroundColor:col};
            }
          }
        },
        annotation:{annotations:{
          wakeLine:{type:'line',yMin:wakeLimit,yMax:wakeLimit,
            borderColor:'rgba(200,200,200,0.55)',borderWidth:1.5,borderDash:[4,4]},
          bedLine:{type:'line',yMin:bedLimit,yMax:bedLimit,
            borderColor:'rgba(200,200,200,0.55)',borderWidth:1.5,borderDash:[4,4]}
        }}
      },
      scales:{
        x:{grid:{color:gridColor},ticks:{color:xLabelColor,font:{size:10},
           callback:(v)=>dates[v]?dates[v].slice(5):''},min:0,max:dates.length-1},
        y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},
           callback:(v)=>yTickLabel(v)},
           min:Y_MIN,max:Y_MAX}
      }
    }
  });
}

function buildSleepLine(id, dates, logMap, rs) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartsRef[id]) { chartsRef[id].destroy(); }
  const isDark = !document.body.classList.contains('light');
  const gridColor = isDark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)';
  const textColor = isDark?'#cccccc':'#555555';
  const xLabelColor = isDark?'#eeeeee':'#222222';
  const minGoalH = rs.sleepMinMin ? rs.sleepMinMin/60 : (rs.sleepMinHour||6);

  const labels = dates.map(d=>d.slice(5));

  // 전체 dailyLogs로 전날 취침 데이터 조회 (기간 첫날도 이전 주 데이터 활용)
  const fullLogMap = {};
  state.dailyLogs.forEach(l => { fullLogMap[l.date] = l; });

  // 올바른 수면시간: 전날 취침 → 해당날 기상
  const data = dates.map(d => {
    const curLog = logMap[d];
    if (!curLog || !curLog.wakeTime) return null;
    // 전날 날짜 계산
    const prevDate = (()=>{ const dt = new Date(d+'T00:00:00'); dt.setDate(dt.getDate()-1); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; })();
    // logMap(기간 내) 또는 fullLogMap(전체) 에서 전날 취침 데이터 조회
    const prevLog = logMap[prevDate] || fullLogMap[prevDate];
    if (!prevLog || !prevLog.sleepTime) return null;
    return sleepHoursFromPrev(prevLog.sleepTime, curLog.wakeTime);
  });

  const colors = data.map(v => v===null ? 'transparent' : v < minGoalH ? '#ff5a5a' : '#5ecfb0');

  chartsRef[id] = new Chart(canvas, {
    type:'line',
    data:{labels,datasets:[{data,
      borderColor:'#5ecfb0',
      backgroundColor:'rgba(94,207,176,.1)',
      fill:true,tension:.35,
      pointBackgroundColor:colors,
      pointBorderColor:colors,
      pointRadius:data.map(v => v===null ? 0 : 4),
      pointHoverRadius:data.map(v => v===null ? 0 : 6),
      spanGaps:false,
      segment:{borderColor:ctx => {
        const v = ctx.p1.parsed.y;
        return v < minGoalH ? '#ff5a5a' : '#5ecfb0';
      }}
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          titleFont:{weight:'bold',size:12},
          bodyFont:{size:12},
          usePointStyle:true,
          callbacks:{
            title:(items) => items[0].label,
            label:(ctx) => {
              const v = ctx.parsed.y;
              if (v === null || v === undefined) return '';
              const h = Math.floor(v);
              const m = Math.round((v - h) * 60);
              return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            },
            labelColor:(ctx) => {
              const v = ctx.parsed.y;
              const col = v < minGoalH ? '#ff5a5a' : '#5ecfb0';
              return {borderColor:col,backgroundColor:col};
            }
          }
        },
        annotation:{annotations:{
          minSleepLine:{type:'line',yMin:minGoalH,yMax:minGoalH,
            borderColor:'rgba(200,200,200,0.55)',borderWidth:1.5,borderDash:[4,4]}
        }}
      },
      scales:{
        x:{grid:{color:gridColor},ticks:{color:xLabelColor,font:{size:10}}},
        y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}},beginAtZero:true,max:12}
      }
    }
  });
}

// 전날 취침 → 해당날 기상으로 수면시간 계산 (시간 단위 float)
function sleepHoursFromPrev(prevSleepTime, wakeTime) {
  if (!prevSleepTime || !wakeTime) return null;
  const [sh, sm] = prevSleepTime.split(':').map(Number);
  const [wh, wm] = wakeTime.split(':').map(Number);
  let sleepMin = sh*60+sm;
  let wakeMin = wh*60+wm;
  // 취침이 자정 이전(18~23시)이면 같은날, 자정 이후(0~11시)면 +1440
  // 기상은 항상 다음날이므로 기상분에 1440 더함
  wakeMin += 1440;
  // 취침이 0~11시면 그것도 이미 다음날이니 +1440
  if (sleepMin < 720) sleepMin += 1440;
  const diff = wakeMin - sleepMin;
  if (diff <= 0 || diff > 1440) return null;
  return diff / 60;
}

function goToCalendarDate(dateStr) {
  // 플래너 캘린더 탭으로 이동 후 해당 월로 이동
  const [yr, mo] = dateStr.split('-').map(Number);
  const now = new Date();
  calOffset = (yr - now.getFullYear()) * 12 + (mo - 1 - now.getMonth());
  plannerTab = 'calendar';
  showPage('planner');
  // 렌더 후 해당 날짜 셀 하이라이트 (비동기 렌더 완료 후)
  setTimeout(() => {
    const cell = document.querySelector(`.cal-cell[data-date="${dateStr}"]`);
    if (cell) cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 400);
}

async function renderCalendar() {
  const container = document.getElementById('planner-calendar');
  const now = new Date(); now.setHours(0,0,0,0);
  const base = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
  const yr = base.getFullYear(), mo = base.getMonth();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const firstDow = (base.getDay() + 6) % 7; // 월=0, 일=6
  const td = today();
  const moStr = `${yr}년 ${mo+1}월`;

  container.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm" id="cal-prev">←</button>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700">${moStr}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" id="cal-refresh" title="구글 캘린더 새로고침">↻</button>
        <button class="btn btn-ghost btn-sm" id="cal-next">→</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      <button class="btn btn-ghost btn-sm" id="btn-google-auth" onclick="updateAuthUI()">🔗 Google 로그인</button>
      <button class="btn btn-ghost btn-sm" id="btn-cal-multiselect" onclick="toggleCalMultiSelect()">☑️ 일정 선택</button>
      <span id="cal-select-count" style="font-size:11px;color:var(--text3)"></span>
      <button class="btn btn-ghost btn-sm" id="btn-cal-shift" onclick="shiftSelectedEvents()" style="display:none;color:var(--amber)">📅 선택 이동</button>
    </div>
    <div id="cal-grid"></div>`;

  document.getElementById('cal-prev').addEventListener('click', () => { calOffset--; renderCalendar(); });
  document.getElementById('cal-next').addEventListener('click', () => { calOffset++; renderCalendar(); });
  document.getElementById('cal-refresh').addEventListener('click', () => {
    refreshIcalDataAndView({ force: true, silent: false });
  });

  // 비동기 iCal 로드
  const cache = await loadIcalData();

  const DOW_NAMES = ['월','화','수','목','금','토','일'];
  let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
    ${DOW_NAMES.map((d,i)=>`<div style="text-align:center;font-size:10px;font-weight:600;color:${i===5?'var(--blue)':i===6?'var(--red)':'var(--text)'};padding:3px 0">${d}</div>`).join('')}
  </div>

  // 앞 빈칸
  for (let i=0; i<firstDow; i++) html += `<div></div>`;

  for (let day=1; day<=daysInMonth; day++) {
    const dateStr = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === td;
    const dow = new Date(yr, mo, day).getDay();
    const log = state.dailyLogs.find(l=>l.date===dateStr);
    const evts = getEventsForDate(dateStr, cache);
    const allEvts = [...evts.study, ...evts.personal];
    const isFuture = dateStr > td;

    const memo = log?.memo;

    let bg = isToday ? 'var(--accent2)' : 'var(--bg3)';

function toggleSingleEventSelect(idx, dateStr) {
  const item = window._selectModalEvts[idx];
  if (!item) return;
  const existIdx = calSelectedEvents.findIndex(s => s.event.id === item.event.id);

    calSelectedEvents.push({ calendarId: item.calendarId, event: item.event });
  }
  // 모달 리스트 갱신

  const countEl = document.getElementById('cal-select-count');
  if (countEl) countEl.textContent = calSelectedEvents.length ? `${calSelectedEvents.length}개 선택됨` : '';

function autoFillEndTime() {
  const startEl = document.getElementById('modal-start-time');
  const endEl   = document.getElementById('modal-end-time');
  if (!startEl || !endEl) return;
  const [h, m] = startEl.value.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return;
  const totalMins = h * 60 + m + 60;
  const eh = Math.floor(totalMins / 60);
  const em = totalMins % 60;
  // 24시 이상이면 HH:MM 형식 그대로 표현 (input type=time은 00:xx로 wrapping하므로 직접 set)
  const pad = n => String(n).padStart(2,'0');
  endEl.value = `${pad(eh % 24)}:${pad(em)}`;
  // 27:xx 개념 저장용 data attribute
  endEl.dataset.overflowHour = eh >= 24 ? String(eh) : '';
}
