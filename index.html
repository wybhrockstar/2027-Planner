<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IMGO 플래너 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141414;--bg2:#1c1c1c;--bg3:#242424;--bg4:#2c2c2c;--bg5:#353535;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--border3:rgba(255,255,255,0.24);
  --text:#efefef;--text2:#b8b8b8;--text3:#777;--text4:#444;
  --accent:#c8f060;--accent2:rgba(200,240,96,0.12);--accent3:rgba(200,240,96,0.06);
  --red:#ff5a5a;--amber:#ffb347;--blue:#6eb5ff;--purple:#b8a5ff;--teal:#5ecfb0;--pink:#ff8fa3;--orange:#ff9f43;
  --r:10px;--rs:6px;
}
body.light{
  --bg:#f5f5f0;--bg2:#ebebeb;--bg3:#ffffff;--bg4:#f0f0eb;--bg5:#e6e6e1;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.2);
  --text:#1a1a1a;--text2:#444;--text3:#888;--text4:#bbb;
  --accent:#5a8a10;--accent2:rgba(90,138,16,0.1);--accent3:rgba(90,138,16,0.05);
  --red:#d93025;--amber:#c87800;--blue:#1a6fc4;--purple:#6b4fc4;--teal:#1a8a6a;--pink:#c4204a;--orange:#c86000;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 10px;outline:none;transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}

/* HEADER */
.hdr{border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:200}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:var(--accent);letter-spacing:.06em}
.hdr-r{display:flex;align-items:center;gap:8px}
.dday-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--accent2);border:1px solid var(--accent);color:var(--accent);padding:3px 10px;border-radius:20px}
.theme-btn{font-size:15px;padding:4px 7px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);transition:.15s;line-height:1}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.backup-btn{font-size:15px;padding:4px 7px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);transition:.15s;line-height:1}
.backup-btn:hover{border-color:var(--accent);color:var(--accent)}

/* NAV */
.nav{display:flex;padding:0 12px;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:45px;z-index:190}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;flex-shrink:0}
.ntab:hover{color:var(--text2)}
.ntab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{padding:20px 16px 90px;max-width:860px;margin:0 auto}
.page{display:none}.page.on{display:block}

/* SECTION */
.sec{margin-bottom:24px}
.sec-hd{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:12px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.card+.card{margin-top:10px}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
@media(min-width:480px){.stats{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px}
.sc-lbl{font-size:10px;color:var(--text3);margin-bottom:4px;letter-spacing:.04em}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.sc-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-lbl{font-size:11px;color:var(--text3);margin-bottom:5px;display:block}
.form-group{margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;border:none;transition:.15s;cursor:pointer}
.btn-primary{background:var(--accent);color:#0a1a00;font-weight:700}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.3);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12px}

/* PROGRESS BAR */
.pbar-wrap{margin-bottom:14px}
.pbar-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.pbar-name{font-size:13px;font-weight:500}
.pbar-pct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}
.pbar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s cubic-bezier(.4,0,.2,1)}
.pbar-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* LECTURE LIST */
.lec-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.lec-item:last-child{border-bottom:none}
.lec-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border3);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.lec-check.done{background:var(--accent);border-color:var(--accent)}
.lec-check.done::after{content:'✓';font-size:11px;color:#0a1a00;font-weight:700}
.lec-info{flex:1;min-width:0}
.lec-title{font-size:13px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lec-title.done-txt{color:var(--text3);text-decoration:line-through}
.lec-meta{font-size:10px;color:var(--text3);margin-top:1px}
.lec-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);margin-left:auto;flex-shrink:0}

/* SUBJ TABS */
.subj-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.stab{padding:5px 12px;font-size:12px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:none;transition:.12s;white-space:nowrap}
.stab:hover{border-color:var(--blue);color:var(--blue)}
.stab.on{background:rgba(110,181,255,.12);border-color:var(--blue);color:var(--blue)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-bg{align-items:center}}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 20px 32px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--r);padding:24px;max-height:80vh}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;line-height:1;padding:2px 6px;border-radius:6px}
.modal-close:hover{color:var(--text);background:var(--bg4)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:.25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV for mobile */
@media(max-width:600px){
  .nav{display:none}
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border2);z-index:190;padding-bottom:env(safe-area-inset-bottom)}
  .btab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;background:none;border:none;color:var(--text3);font-size:9px;font-family:'Noto Sans KR',sans-serif;gap:3px;transition:.12s}
  .btab.on{color:var(--accent)}
  .btab-icon{font-size:18px;line-height:1}
}
@media(min-width:601px){.bnav{display:none}}

/* LECS TODAY CHECKBOXES */
.today-lec-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.today-lec-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg4);cursor:pointer;transition:.12s}
.today-lec-row:hover{border-color:var(--accent)}
.today-lec-row.done{border-color:rgba(200,240,96,.3);background:var(--accent3)}
.today-lec-cb{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.today-lec-row.done .today-lec-cb{background:var(--accent);border-color:var(--accent);color:#0a1a00;font-weight:700}
.today-lec-text{font-size:12px;line-height:1.4;flex:1}
.today-lec-min{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0}

/* STUDY RESULT BUTTONS */
.sr-btns{display:flex;gap:8px;margin-top:6px}
.sr-btn{flex:1;padding:10px 8px;border-radius:var(--rs);border:1.5px solid var(--border2);background:none;font-size:15px;font-weight:700;color:var(--text3);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.sr-btn:hover{border-color:var(--border3);color:var(--text)}
.sr-btn.active-o{border-color:var(--teal);background:rgba(94,207,176,.15);color:var(--teal)}
.sr-btn.active-d{border-color:var(--amber);background:rgba(255,179,71,.15);color:var(--amber)}
.sr-btn.active-x{border-color:var(--red);background:rgba(255,90,90,.15);color:var(--red)}

/* STUDY CHECKLIST in log modal */
.study-checklist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.study-check-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg4);border-radius:var(--rs);border:1px solid var(--border)}
.study-check-item input[type=checkbox]{width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
.study-check-item input[type=text]{font-size:12px;background:none;border:none;padding:0;color:var(--text)}
.study-check-item input[type=text]:focus{border:none;outline:none}

/* TERM PROGRESS BLOCK */
.term-prog-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.term-prog-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.term-prog-name{font-size:13px;font-weight:600}
.term-prog-pct{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.term-prog-dates{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}
.term-prog-days{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;text-align:right}

/* TERM SUBTABS */
.term-subtabs{display:flex;gap:4px;margin-bottom:16px}
.term-stab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border-radius:var(--rs);border:1px solid var(--border2);color:var(--text3);background:none;transition:.12s;text-align:center;cursor:pointer}
.term-stab:hover{border-color:var(--accent);color:var(--accent)}
.term-stab.on{background:var(--accent2);border-color:var(--accent);color:var(--accent)}

/* GRASS GRID */
.grass-grid{display:grid;gap:3px;margin-top:10px}
.grass-cell{border-radius:3px;position:relative;aspect-ratio:1;min-width:0;cursor:default;border:1px solid transparent}
.grass-cell.today-cell{border-color:var(--accent)!important}
.grass-cell-inner{font-size:7px;line-height:1.2;padding:2px;display:flex;flex-direction:column;gap:1px;height:100%;overflow:hidden}
.grass-cell-line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SUBJ INLINE PROGRESS (강의탭) */
.subj-inline-grid{display:flex;flex-direction:column;gap:7px}
.subj-inline-row{display:flex;align-items:center;gap:8px}
.subj-inline-name{font-size:12px;font-weight:500;width:72px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subj-inline-bar{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.subj-inline-fill{height:100%;border-radius:4px;transition:width .5s}
.subj-inline-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;width:90px;text-align:right}

/* LOG TAG */
.log-data{display:flex;flex-wrap:wrap;gap:8px}
.log-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg4);border:1px solid var(--border)}
.log-tag.study{color:var(--accent);border-color:rgba(200,240,96,.3)}
.log-tag.sleep{color:var(--blue);border-color:rgba(110,181,255,.3)}
.log-tag.kcal{color:var(--orange);border-color:rgba(255,159,67,.3)}
.log-tag.sr-o{color:var(--teal);border-color:rgba(94,207,176,.3)}
.log-tag.sr-d{color:var(--amber);border-color:rgba(255,179,71,.3)}
.log-tag.sr-x{color:var(--red);border-color:rgba(255,90,90,.3)}

/* PLANNER SUBTABS */
.planner-subtabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.planner-stab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;transition:.15s;cursor:pointer}
.planner-stab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* PLAN TERM BLOCK */
.term-block{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.term-hd{padding:12px 16px;background:var(--bg4);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.term-hd-name{font-size:13px;font-weight:600}
.term-hd-dates{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.term-body{padding:14px 16px}

/* WEEK SCHEDULE TABLE */
.schedule-table{width:100%;border-collapse:collapse;font-size:11px}
.schedule-table th{padding:5px 4px;text-align:center;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px}
.schedule-table td{padding:4px;border:1px solid var(--border);text-align:center;min-width:0;cursor:pointer;transition:.12s;border-radius:0}
.schedule-table td:hover{background:var(--bg4)}
.schedule-table td.has-content{background:var(--accent3);color:var(--accent)}
.sch-time-col{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);background:var(--bg4)!important;cursor:default!important}

/* REPORT CHARTS */
.chart-wrap{position:relative;height:160px;margin-top:6px}
canvas{width:100%!important}
.report-toggle{display:flex;gap:0;background:var(--bg4);border-radius:var(--r);padding:3px;margin-bottom:16px;width:fit-content}
.report-tog-btn{padding:6px 20px;border-radius:calc(var(--r) - 3px);font-size:13px;font-weight:500;border:none;background:none;color:var(--text3);cursor:pointer;transition:.15s}
.report-tog-btn.on{background:var(--bg3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.report-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.report-nav-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);padding:4px 10px;font-size:14px;cursor:pointer}
.report-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.report-nav-lbl{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);flex:1;text-align:center}

/* EMPTY STATE */
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:13px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* TODO LIST */
.todo-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg4);border-radius:var(--rs);border:1px solid var(--border)}
.todo-item.done-item{opacity:.5}
.todo-item input[type=checkbox]{width:14px;height:14px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
.todo-item-text{flex:1;font-size:12px;cursor:pointer}
.todo-item-text.done-text{text-decoration:line-through;color:var(--text3)}
.todo-del{background:none;border:none;color:var(--text4);font-size:13px;padding:0 4px;cursor:pointer;transition:.12s}
.todo-del:hover{color:var(--red)}
.todo-add-row{display:flex;gap:6px;margin-top:8px}
.todo-add-row input{font-size:12px}

/* SCORE TABLE */
.score-table{width:100%;border-collapse:collapse}
.score-table th{font-size:10px;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
.score-table td{padding:8px 8px;border-bottom:1px solid var(--border);font-size:13px}
.score-pct{font-family:'JetBrains Mono',monospace;font-size:12px}
.score-bar-mini{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px;width:100px}
.score-bar-fill{height:100%;border-radius:2px;background:var(--accent)}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- MODAL: Daily Log -->
<div id="modal-log" class="modal-bg">
<div class="modal">
  <div class="modal-hd">
    <div class="modal-title" id="modal-log-title">오늘 기록 입력</div>
    <button class="modal-close" id="btn-close-log">✕</button>
  </div>
  <div class="form-row">
    <div>
      <label class="form-lbl">기상 시간</label>
      <input type="time" id="inp-wake" placeholder="06:30">
    </div>
    <div>
      <label class="form-lbl">취침 시간</label>
      <input type="time" id="inp-sleep" placeholder="23:00">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label class="form-lbl">공부시간 (H:MM)</label>
      <input type="text" id="inp-study" placeholder="6:30">
    </div>
    <div>
      <label class="form-lbl">칼로리 소모 (kcal)</label>
      <input type="number" id="inp-kcal" placeholder="300">
    </div>
  </div>
  <!-- 스터디 결과 (월수금일만 표시) -->
  <div class="form-group" id="sr-group" style="display:none">
    <label class="form-lbl">스터디 결과</label>
    <div class="sr-btns">
      <button class="sr-btn" id="sr-o" onclick="setSR('O')">
        <svg viewBox="0 0 100 100" style="width:1em;height:1em;display:inline-block;vertical-align:middle"><circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="12"/></svg>
      </button>
      <button class="sr-btn" id="sr-d" onclick="setSR('△')">
        <svg viewBox="0 0 100 100" style="width:1em;height:1em;display:inline-block;vertical-align:middle"><polygon points="50,15 15,85 85,85" fill="none" stroke="currentColor" stroke-width="12" stroke-linejoin="round"/></svg>
      </button>
      <button class="sr-btn" id="sr-x" onclick="setSR('×')">
        <svg viewBox="0 0 100 100" style="width:1em;height:1em;display:inline-block;vertical-align:middle"><line x1="20" y1="20" x2="80" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/><line x1="80" y1="20" x2="20" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/></svg>
      </button>
    </div>
    <!-- 구글 캘린더 스터디 일정 체크리스트 -->
    <div id="study-event-area" style="margin-top:10px;display:none">
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">스터디 체크리스트</div>

// ─── GITHUB SETTINGS (별도 localStorage 키) ─────────────────────────────────
function getGhSettings() {
  try { return JSON.parse(localStorage.getItem('imgo_gh_settings')||'{}'); } catch(e) { return {}; }
}
function saveGhSettingsToStorage(s) {
  localStorage.setItem('imgo_gh_settings', JSON.stringify(s));
}

function saveGhSettings() {
  const s = {
    token: document.getElementById('gh-token').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim() || 'main',
    path: document.getElementById('gh-path').value.trim() || 'data.json'
  };
  saveGhSettingsToStorage(s);
  setGhStatus('✓ GitHub 설정 저장됨', 'ok');
}

function setGhStatus(msg, type) {
  const el = document.getElementById('gh-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = type==='ok' ? 'var(--teal)' : type==='err' ? 'var(--red)' : 'var(--text3)';
}

async function pushToGithub() {
  const s = getGhSettings();
  if (!s.token || !s.repo) { setGhStatus('❌ token과 repo를 먼저 입력하세요', 'err'); return; }
  setGhStatus('⬆️ 업로드 중...', '');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
    // get current sha
    let sha = null;
    const getRes = await fetch(`https://api.github.com/repos/${s.repo}/contents/${s.path||'data.json'}?ref=${s.branch||'main'}`, {
      headers: {'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json'}
    });
    if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
    const body = {message:`planner update ${today()}`, content, branch: s.branch||'main'};
    if (sha) body.sha = sha;
    const putRes = await fetch(`https://api.github.com/repos/${s.repo}/contents/${s.path||'data.json'}`, {
      method: 'PUT',
      headers: {'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (putRes.ok) { setGhStatus('✓ GitHub에 저장 완료', 'ok'); toast('✓ GitHub 저장 완료'); }
    else { const e = await putRes.json(); setGhStatus(`❌ ${e.message}`, 'err'); }
  } catch(e) { setGhStatus(`❌ ${e.message}`, 'err'); }
}

async function pullFromGithub() {
  const s = getGhSettings();
  if (!s.token || !s.repo) { setGhStatus('❌ 설정을 먼저 저장하세요', 'err'); return; }
  setGhStatus('⬇️ 불러오는 중...', '');
  try {
    const res = await fetch(`https://api.github.com/repos/${s.repo}/contents/${s.path||'data.json'}?ref=${s.branch||'main'}`, {
      headers: {'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json'}
    });
    if (!res.ok) { setGhStatus('❌ 파일을 찾을 수 없음', 'err'); return; }
    const d = await res.json();
    const json = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));
    applyImportedState(json);
    setGhStatus('✓ GitHub에서 불러오기 완료', 'ok');
    toast('✓ GitHub 데이터 로드 완료');
  } catch(e) { setGhStatus(`❌ ${e.message}`, 'err'); }
}

async function autoLoadFromGithub() {

  try {

      headers: {'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json'}
    });
    if (!res.ok) return false;
    const d = await res.json();
    const json = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));
    applyImportedState(json);

function applyImportedState(d) {
  if (d.dailyLogs) state.dailyLogs = d.dailyLogs;
  if (d.examScores) state.examScores = d.examScores;
  if (d.termTodos) state.termTodos = {...state.termTodos,...d.termTodos};
  if (d.weeklySchedule) state.weeklySchedule = {...state.weeklySchedule,...d.weeklySchedule};
  if (d.reportSettings) state.reportSettings = {...state.reportSettings,...d.reportSettings};
  if (d.lectures) {
    const m = {}; d.lectures.forEach(l=>m[l.id]=l);
    state.lectures = LECTURE_SEED.map(s=>({...s,...(m[s.id]?{done:m[s.id].done,doneDate:m[s.id].doneDate}:{})}));
    // 파서로 추가된 강의들 (SEED에 없는 것들) 병합
    const seedIds = new Set(LECTURE_SEED.map(l=>l.id));
    const extras = d.lectures.filter(l=>!seedIds.has(l.id));
    state.lectures = [...state.lectures, ...extras];
  }
  saveState();
  renderPage(currentPage);
}

function loadState() {
  try {
    const s = localStorage.getItem('imgo_planner_v1');
    if (s) {
      const p = JSON.parse(s);
      const savedLecMap = {};
      (p.lectures||[]).forEach(l => { savedLecMap[l.id] = l; });
      state.lectures = LECTURE_SEED.map(seed => {
        const saved = savedLecMap[seed.id];
        return saved ? {...seed, done:saved.done, doneDate:saved.doneDate} : {...seed};
      });
      // extras
      const seedIds = new Set(LECTURE_SEED.map(l=>l.id));
      const extras = (p.lectures||[]).filter(l=>!seedIds.has(l.id));
      state.lectures = [...state.lectures, ...extras];
      state.dailyLogs = p.dailyLogs || [];
      state.examScores = p.examScores || [];
      if (p.termTodos) state.termTodos = {...state.termTodos,...p.termTodos};
      if (p.weeklySchedule) state.weeklySchedule = {...state.weeklySchedule,...p.weeklySchedule};
      if (p.reportSettings) state.reportSettings = {...state.reportSettings,...p.reportSettings};
    } else {
      state.lectures = LECTURE_SEED.map(l => ({...l}));
    }
  } catch(e) { state.lectures = LECTURE_SEED.map(l => ({...l})); }
}

function saveState() {
  localStorage.setItem('imgo_planner_v1', JSON.stringify(state));
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function dDay() {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((EXAM_DATE - now) / 86400000);
}
function subjectName(s) { return SUBJ_DISPLAY[s] || s; }
function parseStudyMin(str) {
  if (!str) return 0;
  const m = String(str).match(/^(\d+):(\d+)$/);
  if (m) return parseInt(m[1])*60 + parseInt(m[2]);
  const n = parseInt(str);
  return isNaN(n) ? 0 : n;
}
function fmtMin(m) {
  if (!m) return '0h 0m';
  return `${Math.floor(m/60)}h ${m%60}m`;
}
function sleepHours(wake, bed) {
  if (!wake || !bed) return null;
  const [wh,wm] = wake.split(':').map(Number);
  const [bh,bm] = bed.split(':').map(Number);
  let bedMin = bh*60+bm, wakeMin = wh*60+wm;
  if (bedMin > wakeMin) bedMin -= 1440;
  let diff = wakeMin + 1440 - bedMin;
  if (diff > 1440) diff -= 1440;
  return +(diff/60).toFixed(1);
}
function getCurrentTerm() {
  const td = today();
  for (const t of TERMS) { if (td >= t.start && td <= t.end) return t.id; }
  if (td < TERMS[0].start) return 1;
  return 4;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function srSvg(val) {

  if (val === '△') return `<svg viewBox="0 0 100 100" style="width:.9em;height:.9em;display:inline-block;vertical-align:middle"><polygon points="50,15 15,85 85,85" fill="none" stroke="currentColor" stroke-width="12" stroke-linejoin="round"/></svg>`;
  if (val === '×') return `<svg viewBox="0 0 100 100" style="width:.9em;height:.9em;display:inline-block;vertical-align:middle"><line x1="20" y1="20" x2="80" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/><line x1="80" y1="20" x2="20" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/></svg>`;
  return '';
}
function lecGrade(doneCnt) {

  return '×';
}
function studyGrade(min) {

// iCal 파싱
const CORS_PROXY = 'https://corsproxy.io/?';
async function fetchIcal(url) {
  if (!url) return [];
  try {
    const res = await fetch(CORS_PROXY + encodeURIComponent(url));
    const text = await res.text();
    return parseIcal(text);
  } catch(e) { return []; }
}

function parseIcal(text) {
  const events = [];
  const blocks = text.split('BEGIN:VEVENT');
  for (let i = 1; i < blocks.length; i++) {
    const block = blocks[i];
    const get = (key) => {
      const m = block.match(new RegExp(`${key}[^:]*:([^\\r\\n]+)`));
      return m ? m[1].trim() : '';
    };
    const dtstart = get('DTSTART');
    const dtend = get('DTEND');
    const summary = get('SUMMARY').replace(/\\n/g,' ').replace(/\\,/g,',');
    if (!dtstart || !summary) continue;
    const dateStr = dtstart.replace(/T.*/,'').replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3');
    const endStr = dtend ? dtend.replace(/T.*/,'').replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3') : dateStr;
    events.push({ date: dateStr, endDate: endStr, summary, dtstart });
  }
  return events;
}

function addStudyCheckItem() {
  const inp = document.getElementById('study-check-input');
  const text = inp.value.trim();
  if (!text) return;
  studyCheckItems.push({text, done:false});
  inp.value = '';
  renderStudyChecklist();
}

function saveLog() {
  const td = logModalDate || today();
  const wake = document.getElementById('inp-wake').value;
  const slp = document.getElementById('inp-sleep').value;
  const studyMin = parseStudyMin(document.getElementById('inp-study').value);
  const kcal = parseInt(document.getElementById('inp-kcal').value)||0;
  const memo = document.getElementById('inp-memo').value.trim();
  const studyResult = isStudyDay(td) ? (currentSR || null) : null;
  const studyChecklist = studyCheckItems.length ? [...studyCheckItems] : undefined;
  const entry = { date:td, wakeTime:wake, sleepTime:slp, studyMin, kcal, memo, studyResult };
  if (studyChecklist) entry.studyChecklist = studyChecklist;
  const existing = state.dailyLogs.findIndex(l=>l.date===td);
  if (existing>=0) state.dailyLogs[existing] = entry;
  else state.dailyLogs.push(entry);
  saveState();
  closeModal('modal-log');
  if (td === today()) renderToday();
  else renderPage(currentPage);
  toast('✓ 기록 저장됨');
}

function deleteLog() {
  const td = logModalDate || today();
  state.dailyLogs = state.dailyLogs.filter(l=>l.date!==td);
  saveState();
  closeModal('modal-log');
  if (td === today()) renderToday();
  else renderPage(currentPage);
  toast('기록 삭제됨');
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
let progressTerm = getCurrentTerm();

function renderProgress() {
  // render subtabs
  const tabs = document.getElementById('term-subtabs');
  tabs.innerHTML = TERMS.map(t =>
    `<button class="term-stab ${t.id===progressTerm?'on':''}" data-tid="${t.id}">${t.name}</button>`
  ).join('');
  tabs.querySelectorAll('.term-stab').forEach(btn => {
    btn.addEventListener('click', () => { progressTerm = Number(btn.dataset.tid); renderProgress(); });
  });
  renderProgressContent();
}

function renderProgressContent() {
  const t = TERMS[progressTerm-1];
  const now = today();
  const started = now >= t.start;
  const ended = now > t.end;
  let elapsed = 0;
  if (started) {
    const cur = new Date(Math.min(new Date(), new Date(t.end)));
    elapsed = Math.round((cur - new Date(t.start)) / 86400000);
  }
  const dayPct = t.days ? Math.min(100, Math.round(elapsed/t.days*100)) : 0;
  const status = !started?'예정':ended?'완료':'진행중';
  const statusColor = !started?'var(--text3)':ended?'var(--teal)':'var(--accent)';

  // term period card (이미지 스타일)
  let html = `
  <div class="term-prog-block" style="margin-bottom:16px">
    <div class="term-prog-hd">
      <div>
        <div class="term-prog-name">${t.name} <span style="font-size:11px;color:${statusColor};font-weight:600">${status}</span></div>
        <div class="term-prog-dates">${t.start} ~ ${t.end}</div>
      </div>
      <div style="text-align:right">
        <div class="term-prog-pct" style="color:${statusColor}">${dayPct}%</div>
        <div class="term-prog-days">${elapsed}/${t.days}일</div>
      </div>
    </div>
    <div class="pbar" style="height:8px"><div class="pbar-fill" style="width:${dayPct}%;background:${statusColor}"></div></div>
  </div>`;

  // 달성률 프로그레스바 4종
  const termLogs = state.dailyLogs.filter(l => l.date >= t.start && l.date <= t.end);
  const termDoneLecs = state.lectures.filter(l => l.done && l.doneDate >= t.start && l.doneDate <= t.end).length;
  const totalLecs = state.lectures.length;
  const lecPct = totalLecs ? Math.min(100, Math.round(termDoneLecs/totalLecs*100)) : 0;

  // study days: Mon/Wed/Fri/Sun within term
  const studyDayLogs = termLogs.filter(l => isStudyDay(l.date));
  const studyO = studyDayLogs.filter(l => l.studyResult==='O').length;
  // count all study days (Mon/Wed/Fri/Sun) in term period
  let totalStudyDays = 0;
  const tStart = new Date(t.start), tEnd = new Date(Math.min(new Date(t.end), new Date()));
  for (let d = new Date(tStart); d <= tEnd; d.setDate(d.getDate()+1)) {
    if ([0,1,3,5].includes(d.getDay())) totalStudyDays++;
  }
  const studyPct = totalStudyDays ? Math.min(100, Math.round(studyO/totalStudyDays*100)) : 0;

  const totalStudyMin = termLogs.reduce((s,l)=>s+l.studyMin,0);
  const goalMin = t.days * (state.reportSettings.studyGoalHour * 60);
  const studyHourPct = goalMin ? Math.min(100, Math.round(totalStudyMin/goalMin*100)) : 0;

  const exerciseDays = termLogs.filter(l=>l.kcal>0).length;
  const exPct = elapsed ? Math.min(100, Math.round(exerciseDays/elapsed*100)) : 0;

  html += `<div class="card" style="margin-bottom:16px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text3);margin-bottom:12px">텀 달성률</div>
    ${inlineBar('인강', lecPct, `${termDoneLecs}/${totalLecs}강`, 'var(--accent)')}
    ${inlineBar('스터디', studyPct, `${studyO}/${totalStudyDays}회`, 'var(--teal)')}
    ${inlineBar('복습(공부)', studyHourPct, fmtMin(totalStudyMin), 'var(--blue)')}
    ${inlineBar('운동', exPct, `${exerciseDays}/${elapsed}일`, 'var(--orange)')}
  </div>`;

  // 잔디
  html += renderGrass(t);

  document.getElementById('progress-term-content').innerHTML = html;
  bindGrassClicks();
}

function inlineBar(name, pct, sub, color) {
  return `<div class="pbar-wrap" style="margin-bottom:10px">
    <div class="pbar-hd">
      <div class="pbar-name">${name}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${color}">${pct}% <span style="color:var(--text3);font-size:10px">${sub}</span></div>
    </div>
    <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function renderGrass(term) {
  // build all dates in term
  const dates = [];
  const s = new Date(term.start), e = new Date(term.end);
  for (let d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
    dates.push(d.toISOString().slice(0,10));
  }
  const td = today();
  const logMap = {};
  state.dailyLogs.forEach(l => { logMap[l.date] = l; });
  const lecMap = {}; // date -> count done
  state.lectures.filter(l=>l.done&&l.doneDate).forEach(l => {
    lecMap[l.doneDate] = (lecMap[l.doneDate]||0)+1;
  });

  // Determine columns (weeks) layout
  // Use Sunday-based weeks; start of term's week
  const firstDate = new Date(term.start);
  const startDow = firstDate.getDay(); // 0=Sun
  // pad the start
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  dates.forEach(d => cells.push(d));

  const numCols = Math.ceil(cells.length / 7);

  const cellsHtml = cells.map(d => {
    if (!d) return `<div></div>`;
    const log = logMap[d];
    const lDone = lecMap[d] || 0;
    const isToday = d === td;
    const isFuture = d > td;

    let score = 0;
    let srVal = null, studyVal = null, kcalVal = null;

    if (log) {
      srVal = isStudyDay(d) ? (log.studyResult || '×') : null;
      studyVal = studyGrade(log.studyMin||0);
      kcalVal = kcalGrade(log.kcal||0);
      if (srVal==='O') score++;
      if (lDone>=1) score++;
      if (studyVal==='O') score++;
      if (kcalVal==='O') score++;
    }

    const bg = isFuture ? 'var(--bg4)' :
               !log ? 'rgba(255,255,255,0.04)' :
               score===4 ? '#1a4a0a' :
               score===3 ? '#1a3a10' :
               score===2 ? '#2a3a15' :
               score===1 ? '#2c2c20' : 'rgba(255,255,255,0.04)';

    const srColor = srVal==='O'?'#5ecfb0':srVal==='△'?'#ffb347':srVal==='×'?'#ff5a5a':'';
    const lecColor = lDone>=1?'#c8f060':'var(--text4)';
    const studyColor = studyVal==='O'?'#6eb5ff':studyVal==='△'?'#ffb347':'var(--text4)';
    const kcalColor = kcalVal==='O'?'#ff9f43':kcalVal==='△'?'#ffb347':'var(--text4)';

    const srDisplay = srVal ? (srVal==='O'?'○':srVal==='△'?'△':'×') : '';
    const lecDisplay = lDone > 0 ? String(lDone) : (log?'×':'');
    const studyDisplay = log ? (log.studyMin ? (log.studyMin/60).toFixed(1) : '×') : '';
    const kcalDisplay = log ? (log.kcal ? String(log.kcal) : '×') : '';
    const clickable = !isFuture;

    return `<div class="grass-cell ${isToday?'today-cell':''}" style="background:${bg};border-color:${isToday?'var(--accent)':'transparent'};${clickable?'cursor:pointer':''}" data-date="${d}">
      <div class="grass-cell-inner">
        ${isStudyDay(d) ? `<div class="grass-cell-line" style="color:${srColor}">${srDisplay}</div>` : `<div class="grass-cell-line"></div>`}
        <div class="grass-cell-line" style="color:${lecColor}">${lecDisplay}</div>
        <div class="grass-cell-line" style="color:${studyColor}">${studyDisplay}</div>
        <div class="grass-cell-line" style="color:${kcalColor}">${kcalDisplay}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text3);margin-bottom:8px">일일 체크리스트 현황</div>
    <div style="font-size:9px;color:var(--text3);margin-bottom:6px;display:flex;gap:12px">
      <span style="color:var(--teal)">① 스터디</span>
      <span style="color:var(--accent)">② 인강</span>
      <span style="color:var(--blue)">③ 공부(h)</span>
      <span style="color:var(--orange)">④ 운동</span>
    </div>
    <div class="grass-grid" id="grass-grid-${term.id}" style="grid-template-columns:repeat(${numCols},1fr)">
      ${cellsHtml}
    </div>
  </div>`;
}

// ─── REPORT ──────────────────────────────────────────────────────────────────
let reportMode = 'week'; // 'week' | 'month'
let reportOffset = 0;
let chartsRef = {};

function setReportMode(mode) {
  reportMode = mode;
  reportOffset = 0;
  document.getElementById('rtog-week').classList.toggle('on', mode==='week');
  document.getElementById('rtog-month').classList.toggle('on', mode==='month');
  renderReport();
}

document.getElementById('btn-report-prev').addEventListener('click', () => { reportOffset--; renderReport(); });
document.getElementById('btn-report-next').addEventListener('click', () => { reportOffset++; renderReport(); });

function getReportLogs() {
  const now = new Date(); now.setHours(0,0,0,0);
  let start, end;
  if (reportMode === 'week') {
    const dow = now.getDay();
    const mon = new Date(now); mon.setDate(now.getDate() - ((dow+6)%7) + reportOffset*7);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    start = mon.toISOString().slice(0,10);
    end = sun.toISOString().slice(0,10);
    const s = mon.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    const e = sun.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    document.getElementById('report-period-lbl').textContent = `${s} ~ ${e}`;
    // build all 7 dates
    const dates = [];
    for (let d=new Date(mon); d<=sun; d.setDate(d.getDate()+1)) dates.push(d.toISOString().slice(0,10));
    return {dates, logs: state.dailyLogs.filter(l=>l.date>=start&&l.date<=end)};
  } else {
    const base = new Date(now.getFullYear(), now.getMonth()+reportOffset, 1);
    const yr = base.getFullYear(), mo = base.getMonth();
    const daysInMonth = new Date(yr,mo+1,0).getDate();
    start = `${yr}-${String(mo+1).padStart(2,'0')}-01`;
    end = `${yr}-${String(mo+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
    document.getElementById('report-period-lbl').textContent = `${yr}년 ${mo+1}월`;
    const dates = [];
    for (let i=1; i<=daysInMonth; i++) dates.push(`${yr}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`);
    return {dates, logs: state.dailyLogs.filter(l=>l.date>=start&&l.date<=end)};
  }
}

function renderReport() {
  const {dates, logs} = getReportLogs();
  const logMap = {};
  logs.forEach(l => { logMap[l.date] = l; });
  const rs = state.reportSettings;

  const labels = dates.map(d => d.slice(5));
  const studyData = dates.map(d => logMap[d] ? +(logMap[d].studyMin/60).toFixed(1) : 0);
  const kcalData = dates.map(d => logMap[d] ? (logMap[d].kcal||0) : 0);

  // Study chart - color by goal
  buildBarChart('chart-study', labels, studyData, rs.studyGoalHour, 'var(--accent)', 'var(--red)', `${rs.studyGoalHour}h 목표`);
  buildBarChart('chart-kcal', labels, kcalData, 200, 'var(--orange)', 'var(--text3)', '200kcal');
  buildSleepBubble('chart-sleep-bubble', dates, logMap, rs);
  buildSleepLine('chart-sleep-line', dates, logMap, rs);
}

function buildBarChart(id, labels, data, threshold, goodColor, badColor, thresholdLabel) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartsRef[id]) { chartsRef[id].destroy(); }
  const isDark = !document.body.classList.contains('light');
  const gridColor = isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const textColor = isDark?'#777':'#999';
  const resolved = (v) => ({
    'var(--accent)':'#c8f060','var(--blue)':'#6eb5ff','var(--orange)':'#ff9f43',
    'var(--teal)':'#5ecfb0','var(--red)':'#ff5a5a','var(--text3)':'#777'
  }[v]||v);
  const bgs = data.map(v => v >= threshold ? resolved(goodColor)+'88' : resolved(badColor)+'88');
  const borders = data.map(v => v >= threshold ? resolved(goodColor) : resolved(badColor));
  chartsRef[id] = new Chart(canvas, {
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:bgs,borderColor:borders,borderWidth:0,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}}},
              y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}},beginAtZero:true}}}
  });
}

function buildSleepBubble(id, dates, logMap, rs) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartsRef[id]) { chartsRef[id].destroy(); }
  const isDark = !document.body.classList.contains('light');
  const gridColor = isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const textColor = isDark?'#777':'#999';

  const timeToNum = (t) => { if (!t) return null; const [h,m] = t.split(':').map(Number); return h+m/60; };
  const bedLimit = timeToNum(rs.bedtimeLimit)||1;
  const wakeLimit = timeToNum(rs.wakeTimeLimit)||7.5;

  const wakePoints = [], bedPoints = [];
  dates.forEach((d,i) => {
    const log = logMap[d];
    if (!log) return;
    if (log.wakeTime) {
      const v = timeToNum(log.wakeTime);
      const over = v > wakeLimit;
      wakePoints.push({x:i, y:v, r:5, color: over?'#ff5a5a':'#6eb5ff'});
    }
    if (log.sleepTime) {
      let v = timeToNum(log.sleepTime);
      if (v < 12) v += 24; // normalize midnight+ times
      const over = v > bedLimit + 24;
      bedPoints.push({x:i, y:v % 24, r:5, color: over?'#ff5a5a':'#b8a5ff'});
    }
  });

  // Simple scatter using scatter chart
  chartsRef[id] = new Chart(canvas, {
    type:'scatter',
    data:{datasets:[
      {label:'기상',data:wakePoints.map(p=>({x:p.x,y:p.y})),
       backgroundColor:wakePoints.map(p=>p.color+'bb'),pointRadius:6,pointStyle:'circle'},
      {label:'취침',data:bedPoints.map(p=>({x:p.x,y:p.y})),
       backgroundColor:bedPoints.map(p=>p.color+'bb'),pointRadius:6,pointStyle:'circle'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{color:textColor,font:{size:10}}}},
      scales:{
        x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},
           callback:(v)=>dates[v]?dates[v].slice(5):''},min:0,max:dates.length-1},
        y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},
           callback:(v)=>`${String(Math.floor(v)).padStart(2,'0')}:00`},
           min:0,max:24}
      }
    }
  });
}

function buildSleepLine(id, dates, logMap, rs) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartsRef[id]) { chartsRef[id].destroy(); }
  const isDark = !document.body.classList.contains('light');
  const gridColor = isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const textColor = isDark?'#777':'#999';
  const minGoal = rs.sleepMinHour||6;

  const labels = dates.map(d=>d.slice(5));
  const data = dates.map(d => {
    const l = logMap[d];
    if (!l || !l.wakeTime || !l.sleepTime) return null;
    return sleepHours(l.wakeTime, l.sleepTime);
  });
  const colors = data.map(v => v===null ? 'transparent' : v < minGoal ? '#ff5a5a' : '#6eb5ff');

  chartsRef[id] = new Chart(canvas, {
    type:'line',
    data:{labels,datasets:[{data,borderColor:'#6eb5ff',backgroundColor:'rgba(110,181,255,.1)',
      fill:true,tension:.35,pointBackgroundColor:colors,pointRadius:4,
      segment:{borderColor:ctx => {
        const v = ctx.p1.parsed.y;
        return v < minGoal ? '#ff5a5a' : '#6eb5ff';
      }}
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        annotation:{annotations:{line:{type:'line',yMin:minGoal,yMax:minGoal,
          borderColor:'rgba(255,90,90,.4)',borderWidth:1,borderDash:[4,4]}}}},
      scales:{x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}}},
              y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10}},beginAtZero:true,max:12}}
    }
  });
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
async function renderCalendar() {
  const container = document.getElementById('planner-calendar');
  const now = new Date(); now.setHours(0,0,0,0);
  const base = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
  const yr = base.getFullYear(), mo = base.getMonth();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const firstDow = base.getDay(); // 0=일
  const td = today();
  const moStr = `${yr}년 ${mo+1}월`;

  container.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm" id="cal-prev">←</button>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600">${moStr}</div>
      <button class="btn btn-ghost btn-sm" id="cal-next">→</button>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">iCal 로딩 중...</div>
    <div id="cal-grid"></div>`;

  document.getElementById('cal-prev').addEventListener('click', () => { calOffset--; renderCalendar(); });
  document.getElementById('cal-next').addEventListener('click', () => { calOffset++; renderCalendar(); });

  // 비동기 iCal 로드
  const cache = await loadIcalData();

  const DOW_NAMES = ['일','월','화','수','목','금','토'];
  let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
    ${DOW_NAMES.map((d,i)=>`<div style="text-align:center;font-size:10px;font-weight:600;color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)'};padding:3px 0">${d}</div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px" id="cal-cells">`;

  // 앞 빈칸
  for (let i=0; i<firstDow; i++) html += `<div></div>`;

  for (let day=1; day<=daysInMonth; day++) {
    const dateStr = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === td;
    const dow = new Date(yr, mo, day).getDay();
    const log = state.dailyLogs.find(l=>l.date===dateStr);
    const evts = getEventsForDate(dateStr, cache);
    const allEvts = [...evts.study, ...evts.personal];
    const isFuture = dateStr > td;

    const studyEvt = evts.study[0];
    const personalEvt = evts.personal[0];
    const memo = log?.memo;

    let bg = isToday ? 'var(--accent2)' : 'var(--bg3)';
    let border = isToday ? 'var(--accent)' : 'var(--border)';
    const numColor = dow===0?'var(--red)':dow===6?'var(--blue)':isToday?'var(--accent)':'var(--text)';

    html += `<div class="cal-cell" data-date="${dateStr}" style="background:${bg};border:1px solid ${border};border-radius:6px;padding:4px;min-height:72px;cursor:${isFuture?'default':'pointer'};position:relative">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${numColor};margin-bottom:2px">${day}</div>
      ${studyEvt ? `<div style="font-size:9px;color:var(--teal);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3" title="${studyEvt.summary}">📅 ${studyEvt.summary.slice(0,8)}</div>` : ''}
      ${personalEvt ? `<div style="font-size:9px;color:var(--blue);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3" title="${personalEvt.summary}">🗓 ${personalEvt.summary.slice(0,8)}</div>` : ''}
      ${memo ? `<div style="font-size:9px;color:var(--text2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3;margin-top:2px;border-top:1px solid var(--border)" title="${memo}">💬 ${memo.slice(0,8)}</div>` : (log ? `<div style="font-size:8px;color:var(--text3);margin-top:2px">• 기록있음</div>` : '')}
    </div>`;
  }
  html += '</div>';

  // 범례
  html += `<div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--text3)">
    <span><span style="color:var(--teal)">📅</span> 스터디</span>
    <span><span style="color:var(--blue)">🗓</span> 개인</span>
    <span><span style="color:var(--text2)">💬</span> 한마디</span>
  </div>`;

  const statusEl = container.querySelector('[style*="로딩 중"]');
  if (statusEl) statusEl.textContent = '';
  document.getElementById('cal-grid').innerHTML = html;

  // 날짜 클릭 → 기록 수정 모달
  document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      const d = cell.dataset.date;
      if (d > today()) return;
      openLogModalForDate(d);
    });
  });
}

function renderAnnualPlan() {
  const now = today();
  const container = document.getElementById('planner-annual');
  container.innerHTML = TERMS.map(t => {
    const started = now >= t.start;
    const ended = now > t.end;
    let elapsed = 0;
    if (started) {
      const cur = new Date(Math.min(new Date(), new Date(t.end)));
      elapsed = Math.round((cur - new Date(t.start)) / 86400000);
    }
    const dayPct = t.days ? Math.min(100, Math.round(elapsed/t.days*100)) : 0;
    const status = !started?'예정':ended?'완료':'진행중';
    const statusColor = !started?'var(--text4)':ended?'var(--teal)':'var(--accent)';
    const todos = state.termTodos[t.id] || [];

    return `<div class="term-block" style="margin-bottom:12px">
      <div class="term-hd">
        <div>
          <div class="term-hd-name" style="font-size:14px">${t.name} <span style="font-size:11px;font-weight:400;color:${statusColor}">${status}</span></div>
          <div class="term-hd-dates">${t.start} ~ ${t.end} · ${t.days}일</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:${statusColor}">${dayPct}%</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)">${elapsed}/${t.days}일</div>
        </div>
      </div>
      <div class="term-body">
        <div class="pbar" style="margin-bottom:12px"><div class="pbar-fill" style="width:${dayPct}%;background:${statusColor}"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">할 일 목록</div>
        <div class="todo-list" id="todo-list-${t.id}">${todos.map((td2,i)=>`
          <div class="todo-item ${td2.done?'done-item':''}">
            <input type="checkbox" ${td2.done?'checked':''} data-tid="${t.id}" data-idx="${i}" class="todo-cb">
            <div class="todo-item-text ${td2.done?'done-text':''}" data-tid="${t.id}" data-idx="${i}">${td2.text}</div>
            <button class="todo-del" data-tid="${t.id}" data-idx="${i}">✕</button>
          </div>`).join('')}</div>
        <div class="todo-add-row">
          <input type="text" id="todo-inp-${t.id}" placeholder="할 일 추가...">
          <button class="btn btn-ghost btn-sm" data-tid="${t.id}" class="todo-add-btn" style="white-space:nowrap">추가</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // bind events
  container.querySelectorAll('.todo-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      state.termTodos[cb.dataset.tid][cb.dataset.idx].done = cb.checked;
      saveState(); renderAnnualPlan();
    });
  });
  container.querySelectorAll('.todo-del').forEach(btn => {
    btn.addEventListener('click', () => {
      state.termTodos[btn.dataset.tid].splice(Number(btn.dataset.idx),1);
      saveState(); renderAnnualPlan();
    });
  });
  container.querySelectorAll('[class="btn btn-ghost btn-sm"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tid = btn.dataset.tid;
      const inp = document.getElementById(`todo-inp-${tid}`);
      const text = inp.value.trim();
      if (!text) return;
      if (!state.termTodos[tid]) state.termTodos[tid] = [];
      state.termTodos[tid].push({id:Date.now().toString(36), text, done:false});
      inp.value = '';
      saveState(); renderAnnualPlan();
    });
  });
  // Also handle by delegating add buttons via data attributes
  container.querySelectorAll('.todo-add-row .btn').forEach(btn => {
    const tid = btn.getAttribute('data-tid');
    if (!tid) return;
    btn.addEventListener('click', () => {
      const inp = document.getElementById(`todo-inp-${tid}`);
      const text = inp.value.trim();
      if (!text) return;
      if (!state.termTodos[tid]) state.termTodos[tid] = [];
      state.termTodos[tid].push({id:Date.now().toString(36), text, done:false});
      inp.value = '';
      saveState(); renderAnnualPlan();
    });
  });
}

function renderWeeklySchedule() {
  const container = document.getElementById('planner-weekly');
  const sch = state.weeklySchedule[schEditTerm] || [];
  const termTabsHtml = TERMS.map(t =>
    `<button class="term-stab ${t.id===schEditTerm?'on':''}" data-tid="${t.id}" style="flex:none;padding:6px 16px">${t.name}</button>`
  ).join('');

  let tableHtml = `<table class="schedule-table"><thead><tr>
    <th style="width:44px">시간</th>
    ${DAY_NAMES.map(d=>`<th>${d}</th>`).join('')}
  </tr></thead><tbody>`;

  TIME_SLOTS.forEach(time => {
    const row = sch.find(r=>r.time===time) || {time};
    tableHtml += `<tr>
      <td class="sch-time-col">${time}</td>
      ${DAY_KEYS.map(dk => {
        const val = row[dk]||'';
        return `<td class="${val?'has-content':''}" data-time="${time}" data-day="${dk}">${val}</td>`;
      }).join('')}
    </tr>`;
  });
  tableHtml += '</tbody></table>';

  container.innerHTML = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${termTabsHtml}</div>
    <div class="card" style="padding:8px;overflow-x:auto">${tableHtml}</div>`;

  container.querySelectorAll('.term-stab').forEach(btn => {
    btn.addEventListener('click', () => { schEditTerm = Number(btn.dataset.tid); renderWeeklySchedule(); });
  });
  container.querySelectorAll('.schedule-table td:not(.sch-time-col)').forEach(cell => {
    cell.addEventListener('click', () => {
      schEditKey = {time: cell.dataset.time, day: cell.dataset.day};
      document.getElementById('modal-sch-title').textContent = `${cell.dataset.time} ${DAY_NAMES[DAY_KEYS.indexOf(cell.dataset.day)]}요일`;
      const sch2 = state.weeklySchedule[schEditTerm]||[];
      const row = sch2.find(r=>r.time===cell.dataset.time);
      document.getElementById('inp-sch-cell').value = row ? (row[cell.dataset.day]||'') : '';
      openModal('modal-sch');
    });
  });
}

document.getElementById('btn-close-sch').addEventListener('click', () => closeModal('modal-sch'));
document.getElementById('btn-save-sch').addEventListener('click', () => {
  if (!schEditKey) return;
  const val = document.getElementById('inp-sch-cell').value.trim();
  let sch = state.weeklySchedule[schEditTerm];
  if (!sch) sch = state.weeklySchedule[schEditTerm] = [];
  let row = sch.find(r=>r.time===schEditKey.time);
  if (!row) { row = {time:schEditKey.time}; sch.push(row); }
  if (val) row[schEditKey.day] = val;
  else delete row[schEditKey.day];
  saveState();
  closeModal('modal-sch');
  renderWeeklySchedule();
});
document.getElementById('btn-del-sch').addEventListener('click', () => {
  if (!schEditKey) return;
  let sch = state.weeklySchedule[schEditTerm];
  if (!sch) return;
  const row = sch.find(r=>r.time===schEditKey.time);
  if (row) { delete row[schEditKey.day]; }
  saveState();
  closeModal('modal-sch');
  renderWeeklySchedule();
});

// ─── LECTURE PARSER ──────────────────────────────────────────────────────────
const ALL_SUBJECTS_ORDER = ['국어','수학','과학','과학 개념','영어','영어 심화','총창',
                             '음악','음악 심화','미술','실과','통교','도덕','사회','체육'];
const SUB_DISPLAY_MAP = {'통교':'통합교과','총창':'총론·창체'};
const FILE_TO_INT_MAP  = {'통합교과':'통교','총론·창체':'총창'};

const CIRCLE_MAP_JS = {'①':'1','②':'2','③':'3','④':'4','⑤':'5',
                        '⑥':'6','⑦':'7','⑧':'8','⑨':'9','⑩':'10'};
const FORBIDDEN_RE  = /[\\/:*?"<>|]/g;

function applyNaming(raw){
  let t = raw;
  for(const [c,d] of Object.entries(CIRCLE_MAP_JS)) t = t.replaceAll(c, `(${d})`);
  t = t.replace(FORBIDDEN_RE, '');
  t = t.replace(/(\d)~(\d)/g, '$1\x00$2');
  t = t.replace(/(?<!\s)\(/g, ' (');
  t = t.replace(/\s*~\s*/g, ' ~ ');
  t = t.replace(/(?<=[^\s])-(?=[^\s])/g, ' - ');
  t = t.replaceAll('\x00', '~');
  return t.replace(/  +/g, ' ').trim();
}

const META_LINE_RE = /^\s*(?:\d+\s*%|\d+\s*분|\(\s*\d+\s*분\s*\)|@?시간설정(?:\s+(?:HD|SD))*|시간|HD|SD)\s*$/;

function stripMeta(raw){
  const lines = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const kept = [];
  for(const line of lines){
    if(META_LINE_RE.test(line)) break;
    kept.push(line);
  }
  const text = kept.filter(l=>l.trim()).map(l=>l.trim()).join(' ');
  return text.replace(/  +/g,' ').trim();
}

const DATE_DUR_RE = /\d{4}-\d{1,2}-\d{1,2}[ \t]*\r?\n?[ \t]*\((\d+)분\)/;

function parseLecturesFromText(rawText){
  const text = rawText.replace(/\r\n/g,'\n').replace(/\r/g,'\n');

  // 형식C: [과목명]\nn강. 제목
  const oldResults = [];
  const PAT_C_SECTION = /^\[([^\]]+)\]\s*\n((?:\d+강\.[^\n]*\n?)+)/gm;
  for(const sec of text.matchAll(PAT_C_SECTION)){
    const rawSub = sec[1].trim();
    const sub = FILE_TO_INT_MAP[rawSub] || rawSub;
    const lines = sec[2].split('\n').filter(l=>l.trim());
    for(const line of lines){
      const lm = line.match(/^(\d+)강\.\s*(.+)/);
      if(!lm) continue;
      const k = parseInt(lm[1]);
      let title = applyNaming(lm[2].trim());
      const display = `${k}강. ${title}`;
      oldResults.push({n: k, k, subject: sub, title, duration: null, display, old: true});
    }
  }

  // 형식A
  const PAT_A_RE = /\d{4}-\d{1,2}-\d{1,2}[ \t]*\n[ \t]*\((?<dur>\d+)분\)[ \t]*(?<n>\d+)\s*강\s+(?<k>\d+)\s*강\s*:\s*\[(?<sub>[^\]]+)\][ \t]*(?<title>[^\n]*)/gm;
  const foundA = {};
  for(const m of text.matchAll(PAT_A_RE)){
    const n = parseInt(m.groups.n), k = parseInt(m.groups.k);
    foundA[`${n},${k}`] = {n, k, sub: m.groups.sub.trim(), title_raw: m.groups.title.trim(), duration: parseInt(m.groups.dur)};
  }

  // 형식B
  const PAT_B_RE = /(?<n>\d+)\s*강\s+(?<k>\d+)\s*강\s*:\s*\[(?<sub>[^\]]+)\]\s*(?<block>[\s\S]*?)(?=\n\s*(?:\d{4}-\d{1,2}-\d{1,2}|\d+\s*%|\d+\s*분\s*$|\(\s*\d+\s*분\s*\)|@?시간설정|시간\s*$|HD\s*$|SD\s*$|\d+\s*강\s+\d+\s*강\s*:)|\n*$)/gm;

  const results = {};
  for(const m of text.matchAll(PAT_B_RE)){
    const n = parseInt(m.groups.n), k = parseInt(m.groups.k);
    const key = `${n},${k}`;
    let sub, title, duration;

    if(foundA[key]){
      const r = foundA[key];
      sub = FILE_TO_INT_MAP[r.sub] || r.sub;
      if(n===k && sub==='과학') sub = '과학 개념';
      title = applyNaming(stripMeta(r.title_raw));
      duration = r.duration;
    } else {
      const block = m.groups.block;
      const durM = block.match(DATE_DUR_RE);
      duration = durM ? parseInt(durM[1]) : null;
      let title_raw = block.trim().split('\n')[0].trim();
      title_raw = title_raw.replace(/^\d{4}-\d{1,2}-\d{1,2}[ \t]*(?:\(\d+분\))?[ \t]*/,'');
      title_raw = stripMeta(title_raw);
      title = applyNaming(title_raw);
      sub = FILE_TO_INT_MAP[m.groups.sub.trim()] || m.groups.sub.trim();
      if(n===k && sub==='과학') sub = '과학 개념';
    }

    const isOld = /\(작년\)|\(구\)|작년/.test(title);
    if(isOld) title = title.replace(/\s*\(?작년\)?|\s*\(?구\)?/g,'').trim();

    const durStr = duration ? ` [${duration}분]` : '';
    const display = `${k}강. ${title}${durStr}`;

    results[key] = {n, k, subject: sub, title, duration, display, old: isOld};
  }

  const currentItems = Object.values(results).sort((a,b)=> a.n!==b.n ? a.n-b.n : a.k-b.k);
  return [...currentItems, ...oldResults];
}

function groupBySubject(items){
  const map = {};
  for(const item of items){
    if(!map[item.subject]) map[item.subject] = [];
    map[item.subject].push(item);
  }
  return map;
}

let parsedLecturesBuffer = null;

function setStatus(id, msg, type){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = msg;
  el.style.color = type==='ok'?'var(--teal)':type==='err'?'var(--red)':'var(--text3)';
}

function parseLecturesRule(){
  const input = document.getElementById('lc-input').value.trim();
  if(!input){ setStatus('lc-status','내용을 입력해주세요.','err'); return; }

  const items = parseLecturesFromText(input);
  if(!items.length){ setStatus('lc-status','파싱된 강의가 없습니다. [과목] 태그 형식을 확인하세요.','err'); return; }

  const bySubj = groupBySubject(items);
  parsedLecturesBuffer = {};
  for(const [subj, list] of Object.entries(bySubj)){
    parsedLecturesBuffer[subj] = {
      current: list.filter(i=>!i.old),
      old:     list.filter(i=>i.old)
    };
  }

  renderParsedSubjTabs();
  document.getElementById('lc-preview-wrap').style.display='block';
  setStatus('lc-status',`✓ ${items.length}개 강의 파싱 완료 (${Object.keys(bySubj).length}개 과목)`,'ok');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderParsedSubjTabs(){
  if(!parsedLecturesBuffer) return;
  const showOld = document.getElementById('lc-show-old').checked;
  const tabBar    = document.getElementById('lc-subj-tabs');
  const panelArea = document.getElementById('lc-subj-panels');
  tabBar.innerHTML = '';
  panelArea.innerHTML = '';

  const subjects = Object.keys(parsedLecturesBuffer);
  subjects.sort((a,b)=>{
    const ai = ALL_SUBJECTS_ORDER.indexOf(a), bi = ALL_SUBJECTS_ORDER.indexOf(b);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });

  subjects.forEach((subj, idx)=>{
    const data = parsedLecturesBuffer[subj];
    const newCount = data.current.length;
    const dispSubj = SUB_DISPLAY_MAP[subj]||subj;

    const tab = document.createElement('button');
    tab.className = 'stab' + (idx===0?' on':'');
    tab.textContent = `${dispSubj} (${newCount})`;
    tab.onclick = ()=>{
      document.querySelectorAll('#lc-subj-tabs .stab').forEach(t=>t.classList.remove('on'));
      document.querySelectorAll('#lc-subj-panels .lc-sp').forEach(p=>p.style.display='none');
      tab.classList.add('on');
      document.getElementById(`lc-sp-${subj}`).style.display='block';
    };
    tabBar.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'lc-sp';
    panel.id = `lc-sp-${subj}`;
    panel.style.display = idx===0?'block':'none';
    panel.style.cssText = 'white-space:pre-wrap;font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.8';

    let html = '';
    if(data.current.length){
      html += `<div style="font-size:11px;color:var(--teal);letter-spacing:.06em;margin-bottom:4px">● 올해 강의 (${data.current.length}개)</div>`;
      html += `<div style="margin-bottom:10px">${data.current.map(i=>escHtml(i.display)).join('\n')}</div>`;
    }
    if(showOld && data.old.length){
      html += `<div style="font-size:11px;color:var(--purple);letter-spacing:.06em;margin-bottom:4px">● 작년 강의 (${data.old.length}개)</div>`;
      html += `<div>${data.old.map(i=>escHtml(i.display)).join('\n')}</div>`;
    }
    if(!data.current.length && !(showOld && data.old.length))
      html='<div style="color:var(--text3);font-size:12px;padding:8px">항목 없음</div>';
    panel.innerHTML = html;
    panelArea.appendChild(panel);
  });
}

function applyParsedLectures(mode){
  if(!parsedLecturesBuffer){ toast('먼저 파싱을 실행하세요'); return; }
  const showOld = document.getElementById('lc-show-old').checked;

  // 파싱 결과를 강의 객체 배열로 변환
  const newLecs = [];
  for(const [subj, data] of Object.entries(parsedLecturesBuffer)){
    const toAdd = showOld ? [...data.current, ...data.old] : [...data.current];
    for(const item of toAdd){
      const id = `${subj}_${item.k}${item.old?'_old':''}`;
      newLecs.push({
        id, subject: subj,
        num: `${item.k}강`,
        title: item.display,
        minutes: item.duration || 0,
        term: 1, done: false, doneDate: null
      });
    }
  }

  if(mode === 'replace'){
    // 기존 완료 기록 보존
    const doneMap = {};
    state.lectures.forEach(l=>{ if(l.done) doneMap[l.id] = {done:l.done, doneDate:l.doneDate}; });
    state.lectures = newLecs.map(l=>({...l, ...(doneMap[l.id]||{})}));
    toast(`✓ ${newLecs.length}개 강의로 교체 완료`);
  } else {
    // 병합: 새 강의만 추가
    const existIds = new Set(state.lectures.map(l=>l.id));
    const added = newLecs.filter(l=>!existIds.has(l.id));
    state.lectures = [...state.lectures, ...added];
    toast(`✓ ${added.length}개 강의 추가됨`);
  }

  saveState();
  closeModal('modal-lec-parser');
  renderLectures();
}

loadState();
document.getElementById('dday-txt').textContent = `D-${dDay()}`;
if (localStorage.getItem('imgo_theme')==='light') document.body.classList.add('light');

(async () => {
  const loaded = await autoLoadFromGithub();
  if (loaded) renderPage(currentPage);
})();
</script>
